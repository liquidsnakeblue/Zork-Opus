<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZorkGPT Viewer 4</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ================================================================
           Section 1: Design Tokens
           ================================================================ */
        :root {
            /* Backgrounds */
            --bg-primary: #1a1612;
            --bg-secondary: #241f1a;
            --bg-tertiary: #2e2822;
            --bg-card: #352e27;
            --bg-card-hover: #3d352d;

            /* Accent Colors */
            --accent-gold: #d4a84b;
            --accent-gold-dim: #b8923f;
            --accent-copper: #c97b4b;
            --accent-green: #7cb87c;
            --accent-blue: #6b9fc4;
            --accent-red: #c97b6b;
            --accent-purple: #a87bdb;
            --accent-purple-dim: #8b65b8;
            --accent-purple-dark: #4a3366;
            --accent-teal: #5bb8a8;
            --accent-nav-blue: #64c8ff;
            --accent-nav-green: #64ff96;

            /* Text */
            --text-primary: #e8e0d5;
            --text-secondary: #b5a99a;
            --text-muted: #8a7e70;
            --text-dim: #5a5047;

            /* Borders */
            --border-color: #4a423a;
            --border-subtle: #3a342e;

            /* Shadows */
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.2);

            /* Radii */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            /* Typography Scale */
            --text-xs: 9px;
            --text-sm: 11px;
            --text-base: 13px;
            --text-md: 14px;
            --text-lg: 16px;
            --text-xl: 18px;
            --text-2xl: 22px;

            /* Transitions */
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 0.15s;
            --duration-normal: 0.3s;
            --duration-slow: 0.5s;

            /* Card Image Sizes */
            --card-image-size: 384px;
            --card-image-tablet: 211px;
            --card-image-phone: 135px;

            /* Streaming Theme Text Colors */
            --theme-gold-text: #e0c896;
            --theme-purple-text: #d4b8f0;
            --theme-copper-text: #f0c896;
            --theme-teal-text: #a8e0d8;
            --theme-green-text: #a8f0c0;
            --theme-blue-text: #a8d0f0;
        }

        /* ================================================================
           Section 2: Reset & Base
           ================================================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* ================================================================
           Section 3: Layout Structure
           ================================================================ */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .chat-panel {
            width: 55%;
            min-width: 400px;
            max-width: 80%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .map-panel {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        /* ================================================================
           Section 4: Header Component
           ================================================================ */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
        }

        .logo h1 {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--accent-gold);
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .stat-value.gold { color: var(--accent-gold); }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            animation: breathe 3s ease-in-out infinite;
        }

        .connection-dot.connected {
            background: var(--accent-green);
        }

        .connection-text {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        #high-score.new-record {
            animation: glowGold 1s ease-in-out 3;
        }

        /* Fullscreen Button */
        .fullscreen-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--duration-fast) ease;
        }

        .fullscreen-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-gold);
        }

        .fullscreen-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
            transition: color var(--duration-fast) ease;
        }

        .fullscreen-btn:hover svg { color: var(--accent-gold); }
        .fullscreen-btn .fullscreen-exit { display: none; }
        :fullscreen .fullscreen-btn .fullscreen-enter { display: none; }
        :fullscreen .fullscreen-btn .fullscreen-exit { display: block; }

        /* Streaming status indicator */
        #streaming-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--accent-green);
        }

        #streaming-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: streamingPulse 1s ease-in-out infinite;
        }

        /* ================================================================
           Section 5: Inventory & Objectives Bar
           ================================================================ */
        .inventory-bar {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 8px 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .inventory-label,
        .objectives-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .objectives-label {
            margin-left: 16px;
            padding-left: 16px;
            border-left: 1px solid var(--border-subtle);
        }

        .inventory-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .inv-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: 12px;
            color: var(--text-primary);
            animation: chipEnter 0.3s var(--ease-out-back) forwards;
        }

        .inv-chip-icon { font-size: 12px; }

        .inventory-empty {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Objectives Chips */
        .objectives-area {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .objectives-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .obj-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            transition: all 0.4s ease;
            white-space: nowrap;
        }

        .obj-chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--text-dim);
            transition: all var(--duration-normal) ease;
        }

        .obj-chip.pending {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            background: rgba(107, 159, 196, 0.1);
        }
        .obj-chip.pending .obj-chip-dot { background: var(--accent-blue); }

        .obj-chip.in_progress {
            border-color: var(--accent-gold);
            color: var(--text-primary);
            background: rgba(212, 168, 75, 0.1);
        }
        .obj-chip.in_progress .obj-chip-dot {
            background: var(--accent-gold);
            box-shadow: 0 0 6px 2px rgba(212, 168, 75, 0.6);
            animation: dotGlow 1.5s ease-in-out infinite;
        }

        .obj-chip.completed {
            opacity: 0.6;
            border-color: var(--accent-green);
            color: var(--text-muted);
        }
        .obj-chip.completed .obj-chip-dot {
            background: transparent;
            width: auto;
            height: auto;
            font-size: 10px;
            color: var(--accent-green);
        }
        .obj-chip.completed .obj-chip-dot::before { content: '✓'; }

        .obj-chip.completed.fading-1 { opacity: 0.35; transition: opacity var(--duration-slow) ease; }
        .obj-chip.completed.fading-2 { opacity: 0.15; transition: opacity var(--duration-slow) ease; }

        .objectives-empty-chip {
            font-size: var(--text-sm);
            color: var(--text-dim);
            font-style: italic;
        }

        /* ================================================================
           Section 6: Timeline & Cards
           ================================================================ */
        .chat-header {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .chat-header-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chat-header svg {
            width: 16px;
            height: 16px;
            color: var(--accent-gold);
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Card — NO !important, no height constraints */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            overflow: visible;
            box-shadow: var(--shadow-card);
            transition: border-color var(--duration-fast) ease;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            position: relative;
        }

        .card:hover { border-color: var(--border-color); }

        .card .card-image {
            width: var(--card-image-size);
            min-width: var(--card-image-size);
            min-height: var(--card-image-size);
            flex-shrink: 0;
            align-self: flex-start;
        }

        .card-image {
            width: var(--card-image-size);
            min-width: var(--card-image-size);
            height: var(--card-image-size);
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border-right: 1px solid var(--border-subtle);
        }

        .card-image img {
            width: var(--card-image-size);
            height: var(--card-image-size);
            object-fit: cover;
        }

        .card-image.no-image {
            width: var(--card-image-size);
            min-width: var(--card-image-size);
            height: var(--card-image-size);
            color: var(--text-dim);
            font-size: var(--text-md);
            flex-direction: column;
            gap: 8px;
        }

        .card-image.no-image svg {
            width: 48px;
            height: 48px;
            opacity: 0.3;
        }

        /* Card Content — NO scrolling, content pushes card height */
        .card-content {
            flex: 1;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
            overflow: visible;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .turn-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--accent-gold);
            background: rgba(212, 168, 75, 0.15);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            margin-left: auto;
            font-variant-numeric: tabular-nums;
        }

        .action-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-base);
            font-weight: 500;
            color: var(--accent-blue);
            background: rgba(107, 159, 196, 0.12);
            padding: 5px 12px;
            border-radius: var(--radius-sm);
        }

        .room-change {
            font-size: var(--text-md);
            font-weight: 600;
            color: var(--accent-copper);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: 8px;
        }

        .room-change svg {
            width: 14px;
            height: 14px;
            transform: scaleX(-1);
        }

        /* Card with Room Change */
        .card.room-change-card { border-color: var(--accent-gold-dim); }

        /* Card entry animation */
        .card.entering {
            animation: cardEnter 0.6s var(--ease-out) forwards;
        }

        .card.entering::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-md);
            background: transparent;
            box-shadow: 0 0 30px 8px rgba(212, 168, 75, 0.4);
            animation: glowFade 2s ease-out forwards;
            pointer-events: none;
            z-index: -1;
        }

        /* Pending AI card */
        .card.pending-ai {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px 2px rgba(212, 168, 75, 0.2);
        }

        .card.pending-ai .thinking-placeholder {
            animation: pendingGlow 2s ease-in-out infinite;
        }

        /* ================================================================
           Section 7: Streaming Sections (unified themes)
           ================================================================ */
        .thinking {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 0;
            border-left: 3px solid var(--accent-gold-dim);
            overflow: hidden;
        }

        .thinking-header {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold-dim);
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--duration-fast) ease;
            user-select: none;
        }

        .thinking-header:hover { background: rgba(212, 168, 75, 0.1); }

        .thinking-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thinking-toggle {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform var(--duration-normal) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .thinking.collapsed .thinking-toggle { transform: rotate(-90deg); }

        .thinking-content {
            max-height: 50000px;
            overflow: visible;
            transition: max-height var(--duration-slow) cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.4s ease,
                        opacity 0.4s ease;
            padding: 0 16px 12px 16px;
            opacity: 1;
        }

        /* Streaming state: fixed height with auto-scroll and top fade */
        .thinking.streaming .thinking-content {
            max-height: 12em;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
        }

        .thinking.streaming .thinking-content::before {
            content: '';
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 2em;
            background: linear-gradient(var(--bg-tertiary), transparent);
            pointer-events: none;
            display: block;
            margin-bottom: -2em;
            z-index: 1;
        }

        /* Streaming cursor */
        .thinking.streaming .thinking-text::after {
            content: '▌';
            animation: cursorBlink 0.8s step-end infinite;
            color: inherit;
            opacity: 0.7;
        }

        .thinking.collapsed .thinking-content {
            max-height: 4.8em;
            padding: 8px 16px;
            opacity: 0.7;
            overflow: hidden;
            position: relative;
        }

        .thinking.collapsing .thinking-content { opacity: 0.5; }

        .thinking.collapsed .thinking-content::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2em;
            background: linear-gradient(transparent, var(--bg-tertiary));
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--duration-normal) ease 0.2s;
        }

        .thinking.collapsed:not(.collapsing) .thinking-content::after { opacity: 1; }

        .thinking-text {
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            font-size: var(--text-base);
            font-weight: 400;
            line-height: 1.7;
            color: var(--theme-gold-text);
            white-space: pre-wrap;
            margin: 0;
        }

        .thinking-word-count {
            font-size: 10px;
            color: var(--text-dim);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
        }

        .reasoning-section { margin-bottom: 12px; }
        .reasoning-section:last-child { margin-bottom: 0; }

        .reasoning-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .thinking-content .tool-annotation { margin: 12px 0; }

        /* Theme: Gold (Agent Reasoning) — default */
        .thinking.theme-gold { border-left-color: var(--accent-gold-dim); }
        .thinking.theme-gold .thinking-header { color: var(--accent-gold-dim); }
        .thinking.theme-gold .thinking-header:hover { background: rgba(212, 168, 75, 0.1); }
        .thinking.theme-gold .thinking-text { color: var(--theme-gold-text); }
        .thinking.theme-gold .streaming-dots span { background: var(--accent-gold-dim); }

        /* Theme: Purple (Deep Reasoner) */
        .thinking.theme-purple { border-left-color: var(--accent-purple-dim); }
        .thinking.theme-purple .thinking-header { color: var(--accent-purple); }
        .thinking.theme-purple .thinking-header:hover { background: rgba(168, 123, 219, 0.1); }
        .thinking.theme-purple .thinking-text { color: var(--theme-purple-text); }
        .thinking.theme-purple .streaming-dots span { background: var(--accent-purple); }

        /* Theme: Copper (Memory Synthesis) */
        .thinking.theme-copper { border-left-color: var(--accent-copper); }
        .thinking.theme-copper .thinking-header { color: var(--accent-copper); }
        .thinking.theme-copper .thinking-header:hover { background: rgba(201, 123, 75, 0.1); }
        .thinking.theme-copper .thinking-text { color: var(--theme-copper-text); }
        .thinking.theme-copper .streaming-dots span { background: var(--accent-copper); }

        /* Theme: Teal (Objective Review) */
        .thinking.theme-teal { border-left-color: var(--accent-teal); }
        .thinking.theme-teal .thinking-header { color: var(--accent-teal); }
        .thinking.theme-teal .thinking-header:hover { background: rgba(91, 184, 168, 0.1); }
        .thinking.theme-teal .thinking-text { color: var(--theme-teal-text); }
        .thinking.theme-teal .streaming-dots span { background: var(--accent-teal); }

        /* Theme: Green (Follow-up Reasoning) */
        .thinking.theme-green { border-left-color: var(--accent-nav-green); }
        .thinking.theme-green .thinking-header { color: var(--accent-nav-green); }
        .thinking.theme-green .thinking-header:hover { background: rgba(100, 255, 150, 0.1); }
        .thinking.theme-green .thinking-text { color: var(--theme-green-text); }
        .thinking.theme-green .streaming-dots span { background: var(--accent-nav-green); }

        /* Theme: Blue (Web Search) */
        .thinking.theme-blue { border-left-color: #5b9bd5; }
        .thinking.theme-blue .thinking-header { color: #5b9bd5; }
        .thinking.theme-blue .thinking-header:hover { background: rgba(91, 155, 213, 0.1); }
        .thinking.theme-blue .thinking-text { color: var(--theme-blue-text); }
        .thinking.theme-blue .streaming-dots span { background: #5b9bd5; }

        /* ================================================================
           Section 8: Reasoner Cards
           ================================================================ */
        .reasoner-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 16px;
            border-left: 4px solid var(--accent-purple);
            box-shadow: var(--shadow-card);
            animation: slideIn var(--duration-normal) ease-out;
            flex-direction: column;
        }

        .reasoner-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .reasoner-card .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reasoner-card .card-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple-dim));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-lg);
        }

        .reasoner-card .card-label {
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-purple);
        }

        .reasoner-card .trigger-reason {
            font-size: var(--text-base);
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .reasoner-card .card-turn {
            font-size: var(--text-sm);
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .reasoner-phase {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--accent-purple);
            background: var(--accent-purple-dark);
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .reasoner-phase .phase-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: pulseDot 1.5s ease-in-out infinite;
        }

        .reasoner-objectives {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .reasoner-objectives-header {
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-purple);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reasoner-objective-item {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-purple-dim);
        }
        .reasoner-objective-item:last-child { margin-bottom: 0; }

        .reasoner-objective-id {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reasoner-objective-name {
            font-size: var(--text-base);
            font-weight: 500;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .reasoner-objective-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.4;
        }

        .reasoner-objective-category {
            display: inline-block;
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 6px;
        }

        .reasoner-objective-category.action {
            background: rgba(108, 159, 196, 0.2);
            color: var(--accent-blue);
        }

        .reasoner-objective-category.exploration {
            background: rgba(124, 184, 124, 0.2);
            color: var(--accent-green);
        }

        /* ================================================================
           Section 9: Post-Action Sections
           ================================================================ */
        .memory-synthesis-section,
        .objective-review-section,
        .web-search-section {
            margin-top: 8px;
        }

        .memory-synthesis-header,
        .objective-review-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .memory-synthesis-header { color: var(--accent-copper); }
        .objective-review-header { color: var(--accent-teal); }

        .memory-synthesis-header .phase-dot,
        .objective-review-header .phase-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulseDot 1.5s ease-in-out infinite;
        }
        .memory-synthesis-header .phase-dot { background: var(--accent-copper); }
        .objective-review-header .phase-dot { background: var(--accent-teal); }

        .memory-result-category {
            display: inline-block;
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(201, 123, 75, 0.2);
            color: var(--accent-copper);
            margin-left: 8px;
        }

        .objective-completed-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(91, 184, 168, 0.15);
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--accent-teal);
        }
        .objective-completed-item .checkmark { font-size: var(--text-md); }

        .objective-progress-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .objective-progress-item .progress-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            background: rgba(91, 184, 168, 0.2);
            border-radius: 4px;
            color: var(--accent-teal);
        }

        /* Memory Result Indicators */
        .memory-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            font-size: var(--text-base);
        }

        .memory-result.memory-created {
            background: rgba(205, 133, 63, 0.15);
            border-left: 3px solid var(--accent-copper);
            color: #e8b97a;
        }

        .memory-result.memory-skipped {
            background: var(--bg-tertiary);
            border-left: 3px solid #6b6357;
            color: var(--text-secondary);
        }

        .memory-result-icon { font-size: var(--text-lg); }
        .memory-result-text strong { color: var(--accent-copper); }

        .memory-category-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            background: rgba(205, 133, 63, 0.25);
            border-radius: 4px;
            color: var(--accent-copper);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Objective Result Indicators */
        .objective-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            font-size: var(--text-base);
        }

        .objective-result.objectives-completed {
            background: rgba(91, 184, 168, 0.15);
            border-left: 3px solid var(--accent-teal);
            color: var(--theme-teal-text);
        }

        .objective-result.objectives-updated {
            background: rgba(91, 184, 168, 0.1);
            border-left: 3px solid #4a9a8a;
            color: #8cc8bc;
        }

        .objective-result.objectives-unchanged {
            background: var(--bg-tertiary);
            border-left: 3px solid #6b6357;
            color: var(--text-secondary);
        }

        .objective-result-icon { font-size: var(--text-lg); }
        .objective-result-text strong { color: var(--accent-teal); }

        /* AI Action Section */
        .ai-action {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            border-left: 3px solid var(--accent-blue);
        }

        .ai-action-header {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 6px;
        }

        .ai-action-text {
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            font-size: var(--text-base);
            font-weight: 400;
            line-height: 1.7;
            color: #96c8e0;
            margin: 0;
        }

        /* Outcome Section */
        .outcome {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            border-left: 3px solid var(--accent-green);
        }

        .outcome-header {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-green);
            margin-bottom: 6px;
        }

        .outcome-text {
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.8;
            color: #96e0a8;
        }

        .outcome.suggested-approach {
            border-left-color: var(--accent-teal);
            background: rgba(102, 187, 204, 0.05);
        }
        .outcome.suggested-approach .outcome-header { color: var(--accent-teal); }
        .outcome.suggested-approach .outcome-text { color: #a8d8e6; }

        /* Objectives List within Outcome */
        .objectives-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .objective-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            border-left: 3px solid var(--accent-teal);
        }

        .objective-item .objective-id {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-teal);
            background: rgba(102, 187, 204, 0.15);
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
        }

        .objective-item .objective-name {
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--text-primary);
        }

        .objective-item .objective-category {
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .objective-item .objective-category.exploration {
            background: rgba(102, 187, 204, 0.2);
            color: var(--accent-teal);
        }

        .objective-item .objective-category.action {
            background: rgba(108, 159, 196, 0.2);
            color: var(--accent-blue);
        }

        .objective-item .objective-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 6px 0 0 0;
            line-height: 1.5;
        }

        .objective-item .objective-completion {
            font-size: var(--text-sm);
            color: var(--accent-green);
            margin: 4px 0 0 0;
            padding-left: 8px;
            border-left: 2px solid var(--accent-green);
            font-style: italic;
        }

        /* ================================================================
           Section 10: Tool Overlays & Annotations
           ================================================================ */
        .tool-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(212, 168, 75, 0.15);
            border: 1px solid rgba(212, 168, 75, 0.4);
            border-radius: 12px;
            font-size: 12px;
            color: var(--accent-gold);
            transition: opacity var(--duration-normal) ease, transform var(--duration-normal) ease;
            margin-left: auto;
        }

        .tool-status-bar.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .tool-status-bar .status-icon { font-size: var(--text-md); }
        .tool-status-bar.processing .status-icon { animation: statusPulse 1s ease-in-out infinite; }

        .tool-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-lg);
            z-index: 10;
            animation: overlayFadeIn 0.6s ease;
        }

        .tool-overlay .tool-icon {
            font-size: 48px;
            margin-bottom: 12px;
            animation: toolBounce 1s ease-in-out infinite;
        }

        .tool-overlay .tool-label {
            font-size: var(--text-lg);
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .tool-overlay .tool-detail {
            font-size: var(--text-base);
            color: var(--text-secondary);
            max-width: 80%;
            text-align: center;
        }

        .tool-overlay.pathfinder {
            border: 2px solid rgba(100, 200, 255, 0.6);
        }
        .tool-overlay.pathfinder .tool-label { color: var(--accent-nav-blue); }

        .tool-overlay.objective {
            border: 2px solid rgba(100, 255, 150, 0.6);
        }
        .tool-overlay.objective .tool-label { color: var(--accent-nav-green); }

        .tool-overlay.objective_followup {
            border: 2px solid rgba(100, 255, 150, 0.6);
            background: rgba(0, 0, 0, 0.75);
        }
        .tool-overlay.objective_followup .tool-label { color: var(--accent-nav-green); }
        .tool-overlay.objective_followup .tool-icon { animation: toolPulse 1.5s ease-in-out infinite; }

        /* Tool Annotations */
        .tool-annotation {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            animation: annotationSlideIn 0.4s ease;
        }

        .tool-annotation.pathfinder {
            background: rgba(100, 200, 255, 0.15);
            border-left: 3px solid var(--accent-nav-blue);
            color: var(--accent-nav-blue);
        }

        .tool-annotation.objective {
            background: rgba(100, 255, 150, 0.15);
            border-left: 3px solid var(--accent-nav-green);
            color: var(--accent-nav-green);
        }

        .tool-annotation .annotation-icon { font-size: 12px; }
        .tool-annotation .annotation-text { color: var(--text-secondary); }

        .tool-annotation.followup-annotation {
            margin: 12px 0;
            padding: 8px 12px;
        }

        /* ================================================================
           Section 11: Map Panel
           ================================================================ */
        .map-header {
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .map-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-header-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .map-header svg {
            width: 16px;
            height: 16px;
            color: var(--accent-copper);
        }

        .map-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .map-stats span {
            color: var(--accent-gold);
            font-weight: 600;
        }

        .map-container {
            flex: 1;
            overflow: auto;
            padding: 16px;
            display: flex;
        }

        .map-diagram {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            flex: 1;
            min-height: 0;
            position: relative;
        }

        #cytoscape-map {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        .map-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .map-control-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            font-weight: 600;
            transition: all var(--duration-fast) ease;
        }

        .map-control-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .map-control-btn:active { transform: scale(0.95); }
        .map-control-btn.fit-btn { font-size: 12px; }

        /* ================================================================
           Section 12: Navigation Bar
           ================================================================ */
        .navigation-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.15), rgba(100, 200, 255, 0.05));
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            margin: 8px 12px;
            transition: opacity var(--duration-normal) ease, max-height var(--duration-normal) ease;
            overflow: hidden;
        }

        .navigation-bar.hidden {
            opacity: 0;
            max-height: 0;
            padding: 0 16px;
            margin: 0 12px;
            border: none;
        }

        .nav-destination {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .nav-thumbnail {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            border: 2px solid rgba(100, 200, 255, 0.5);
            background: var(--bg-tertiary);
        }

        .nav-thumbnail[src=""],
        .nav-thumbnail:not([src]) { display: none; }

        .nav-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-room-name {
            font-size: var(--text-md);
            font-weight: 600;
            color: var(--accent-nav-blue);
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-progress {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 100px;
        }

        .nav-progress-bar {
            height: 6px;
            background: rgba(100, 200, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .nav-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-nav-blue), #4da8df);
            border-radius: 3px;
            transition: width var(--duration-normal) ease;
            width: 0%;
        }

        .nav-progress-text {
            font-size: var(--text-sm);
            color: var(--text-muted);
            text-align: center;
        }

        .nav-direction {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 12px;
            background: rgba(100, 200, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }

        .nav-direction-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-direction-value {
            font-size: var(--text-md);
            font-weight: 700;
            color: var(--accent-nav-blue);
            text-transform: uppercase;
        }

        /* ================================================================
           Section 13: Utility & State Classes
           ================================================================ */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Thinking placeholder */
        .thinking-placeholder {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent-gold);
        }

        .thinking-placeholder:has(.thinking) {
            display: block;
            padding: 0;
            background: transparent;
            border-left: none;
        }

        .thinking-dots {
            display: flex;
            gap: 6px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: thinkingPulse 1.4s ease-in-out infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        .thinking-placeholder > .thinking-text {
            font-size: var(--text-base);
            font-style: italic;
            color: var(--text-secondary);
            white-space: normal;
        }

        /* AI data reveal animation */
        .card .ai-section.revealing {
            animation: aiReveal 0.6s ease-out forwards;
        }

        /* Streaming dots */
        .streaming-dots {
            display: flex;
            gap: 3px;
        }

        .streaming-dots span {
            width: 5px;
            height: 5px;
            background: var(--accent-gold-dim);
            border-radius: 50%;
            animation: streamingPulse 1s ease-in-out infinite;
        }
        .streaming-dots span:nth-child(2) { animation-delay: 0.15s; }
        .streaming-dots span:nth-child(3) { animation-delay: 0.3s; }

        /* Panel Divider */
        .panel-divider {
            width: 6px;
            background: var(--border-subtle);
            cursor: col-resize;
            transition: background var(--duration-fast) ease;
            flex-shrink: 0;
        }

        .panel-divider:hover,
        .panel-divider.dragging { background: var(--accent-gold); }

        /* Mobile Tab Switcher */
        .mobile-tabs {
            display: none;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 12px;
            gap: 8px;
        }

        .mobile-tab {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: var(--text-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-fast) ease;
            text-align: center;
        }

        .mobile-tab.active {
            background: var(--accent-gold);
            color: var(--bg-primary);
            border-color: var(--accent-gold);
        }

        /* ================================================================
           Section 14: All @keyframes
           ================================================================ */
        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }

        @keyframes glowGold {
            0%, 100% { color: var(--accent-gold); text-shadow: none; }
            50% { color: #ffd700; text-shadow: 0 0 10px var(--accent-gold); }
        }

        @keyframes cardEnter {
            0% { opacity: 0; transform: translateY(-30px) scale(0.97); }
            70% { transform: translateY(4px) scale(1); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        @keyframes dotGlow {
            0%, 100% { box-shadow: 0 0 4px 1px rgba(212, 168, 75, 0.4); }
            50% { box-shadow: 0 0 8px 3px rgba(212, 168, 75, 0.8); }
        }

        @keyframes thinkingPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        @keyframes streamingPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes pendingGlow {
            0%, 100% { background: rgba(212, 168, 75, 0.08); }
            50% { background: rgba(212, 168, 75, 0.15); }
        }

        @keyframes aiReveal {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes overlayFadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        @keyframes toolBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes toolPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes annotationSlideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes chipEnter {
            0% { opacity: 0; transform: scale(0.8); }
            60% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0; }
        }

        /* ================================================================
           Section 15: Consolidated Media Queries (1200 → 768 → 600 → 480)
           ================================================================ */
        @media (max-width: 1200px) {
            .mobile-tabs { display: flex; }

            .main-content {
                display: block;
                height: auto;
                flex: 1;
                overflow: hidden;
            }

            .chat-panel[data-mobile-visible="true"] {
                display: block;

                max-width: 100%;

            }

            .map-panel[data-mobile-visible="true"] {
                display: block;
                width: 100%;
                height: 100%;
            }

            .map-panel[data-mobile-visible="false"] { display: none; }

            .panel-divider { display: none; }

            /* Tablet card images */
            .card .card-image {
                width: var(--card-image-tablet);
                min-width: var(--card-image-tablet);
                height: var(--card-image-tablet);
                min-height: var(--card-image-tablet);

            .card-image img {

            }

            .card-image.no-image {
                width: var(--card-image-tablet);
                min-width: var(--card-image-tablet);
                height: var(--card-image-tablet);
                min-height: var(--card-image-tablet);
            }
        }

        @media (max-width: 768px) {
            body { overflow: auto; }

            .app-container {
                display: block;
                height: auto;
                min-height: 100vh;
            }

            .header {
                flex-wrap: wrap;
                padding: 10px 12px;
                gap: 10px;
            }

            .header-left { flex-wrap: wrap; gap: 10px; }
            .logo h1 { font-size: var(--text-xl); }
            .logo-icon { width: 32px; height: 32px; }
            .header-stats { gap: 12px; }
            .stat-value { font-size: var(--text-lg); }
            .header-right { gap: 10px; }
            .inventory-bar { padding: 8px 12px; }
            .inv-chip { padding: 3px 8px; font-size: var(--text-sm); }
            .main-content { height: auto; }
            .chat-panel { height: auto; }
            .chat-header { padding: 10px 12px; }

            .timeline {
                display: block;
                padding: 12px;
                max-height: none;
                overflow: visible;
            }

            .card { margin-bottom: 16px; }
            .card-header { margin-bottom: 10px; }
            .map-header { padding: 10px 12px; }

            .map-panel[data-mobile-visible="true"] {
                height: auto;
                min-height: 300px;
            }
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                height: auto;
            }

            .card .card-image {
                width: 100%;
                min-width: 100%;
                height: var(--card-image-phone);
                min-height: var(--card-image-phone);

                min-width: 100%;

        }

        @media (max-width: 480px) {

        /* ================================================================
           Section 16: prefers-reduced-motion
           ================================================================ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
