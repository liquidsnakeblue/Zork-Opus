                StreamingLifecycle.update(followupId, msg.reasoning);
            }
            if (msg.action) {
                let as = card.querySelector('.ai-action:not(.streaming-action-display)');
                if (!as) {
                    const f = card.querySelector(`[data-stream-id="${followupId}"]`);
                    if (f) f.insertAdjacentHTML('afterend', `<div class="ai-action ai-section"><div class="ai-action-header">AI Action</div><p class="ai-action-text">${Utils.escapeHtml(msg.action)}</p></div>`);
                } else {
                    const at = as.querySelector('.ai-action-text');
                    if (at) at.textContent = msg.action;
                }
            }
            AppState.streaming.followupReasoning = msg.reasoning || '';
        }

        function _handleReasonerStart(msg) {
            AppState.reasoner.currentTurn = msg.turn;
            AppState.reasoner.reasoning = '';
            const timeline = document.getElementById('timeline');
            if (!timeline) return;
            const cardHtml = `<div class="card reasoner-card" data-reasoner-turn="${msg.turn}"><div class="card-header"><div class="card-title"><div class="card-icon">🧠</div><div><div class="card-label">Deep Reasoner</div><div class="trigger-reason">${Utils.escapeHtml(msg.trigger_reason)}</div></div></div><div class="card-turn">Turn ${msg.turn}</div></div><div class="card-content"></div></div>`;
            const turnCard = timeline.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (turnCard) turnCard.insertAdjacentHTML('beforebegin', cardHtml);
            else {
                const all = timeline.querySelectorAll('.card[data-turn]');
                let inserted = false;
                for (const c of all) { if (parseInt(c.dataset.turn) < msg.turn) { c.insertAdjacentHTML('beforebegin', cardHtml); inserted = true; break; } }
                if (!inserted) timeline.insertAdjacentHTML('beforeend', cardHtml);
            }
            const newCard = timeline.querySelector(`.reasoner-card[data-reasoner-turn="${msg.turn}"]`);
            if (newCard) {
                StreamingLifecycle.create(newCard.querySelector('.card-content'), { streamId: `reasoner-${msg.turn}`, theme: 'purple', title: 'Strategic Analysis', initialText: 'Analyzing game state...' });
                newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function _handleReasonerChunk(msg) {
            if (msg.turn !== AppState.reasoner.currentTurn) return;
            AppState.reasoner.reasoning = msg.reasoning;
            StreamingLifecycle.update(`reasoner-${msg.turn}`, msg.reasoning || 'Analyzing...');
        }

        function _handleReasonerComplete(msg) {
            const finalR = msg.reasoning || AppState.reasoner.reasoning;
            let resultsHtml = '';
            if (msg.suggested_approach) resultsHtml += `<div class="outcome suggested-approach"><div class="outcome-header">🧭 Suggested Approach (Next 10 Turns)</div><p class="outcome-text">${Utils.escapeHtml(msg.suggested_approach)}</p></div>`;
            if (msg.objectives && msg.objectives.length > 0) {
                resultsHtml += `<div class="outcome"><div class="outcome-header">🎯 Discovered Objectives (${msg.objectives.length})</div><div class="objectives-list">${msg.objectives.map(obj => `<div class="objective-item"><span class="objective-id">${Utils.escapeHtml(obj.id)}</span><span class="objective-name">${Utils.escapeHtml(obj.name)}</span><span class="objective-category ${obj.category}">${obj.category}</span><p class="objective-text">${Utils.escapeHtml(obj.text)}</p>${obj.completion_condition ? `<p class="objective-completion">✓ Complete when: ${Utils.escapeHtml(obj.completion_condition)}</p>` : ''}</div>`).join('')}</div></div>`;
            } else {
                resultsHtml += `<div class="outcome"><div class="outcome-header">Objectives</div><p class="outcome-text">No new objectives discovered.</p></div>`;
            }
            StreamingLifecycle.finalize(`reasoner-${msg.turn}`, { finalContent: finalR, resultHtml: resultsHtml, collapseDelay: CONFIG.COLLAPSE_DELAY });
            AppState.reasoner.currentTurn = null;
            AppState.reasoner.reasoning = '';
        }

        function _handleReasonerToolCall(msg) {
            const card = document.querySelector(`.reasoner-card[data-reasoner-turn="${msg.turn}"]`);
            if (!card) return;
            const cc = card.querySelector('.card-content');
            if (!cc) return;

            const icon = msg.tool_name === 'web_search' ? '🔍' : '🌐';
            const label = msg.tool_name === 'web_search' ? 'Web Search' : 'Web Crawl';
            const toolId = `reasoner-tool-${msg.turn}-${Date.now()}`;

            if (msg.status === 'started') {
                const html = `<div class="reasoner-tool-call" data-tool-id="${toolId}" style="margin:6px 0;padding:8px 12px;background:rgba(59,130,246,0.08);border-left:3px solid var(--accent-blue,#3b82f6);border-radius:4px;font-size:0.85em;">
                    <span style="margin-right:6px;">${icon}</span>
                    <strong>${label}:</strong> <span class="tool-query">${Utils.escapeHtml(msg.query)}</span>
                    <span class="streaming-dots" style="margin-left:8px;"><span></span><span></span><span></span></span>
                </div>`;
                // Insert before the streaming thinking section so it appears inline
                const thinkingSection = cc.querySelector(`[data-stream-id="reasoner-${msg.turn}"]`);
                if (thinkingSection) thinkingSection.insertAdjacentHTML('beforebegin', html);
                else cc.insertAdjacentHTML('beforeend', html);
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else if (msg.status === 'completed') {
                // Find the most recent started tool call and mark it complete
                const pendingTools = cc.querySelectorAll('.reasoner-tool-call .streaming-dots');
                if (pendingTools.length > 0) {
                    const lastPending = pendingTools[pendingTools.length - 1];
                    const parentDiv = lastPending.closest('.reasoner-tool-call');
                    lastPending.remove();
                    if (msg.result_summary) {
                        parentDiv.insertAdjacentHTML('beforeend', ` <span style="opacity:0.7;">— ${Utils.escapeHtml(msg.result_summary)}</span>`);
                    }
                    parentDiv.style.borderLeftColor = 'var(--accent-green, #22c55e)';
                }
            }
        }

        function _handleMemSynthStart(msg) {
            AppState.memorySynthesis.turn = msg.turn;
            AppState.memorySynthesis.content = '';
            const card = document.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (!card) return;
            const cc = card.querySelector('.card-content');
            if (cc) {
                cc.insertAdjacentHTML('beforeend', `<div class="memory-synthesis-section" data-turn="${msg.turn}"></div>`);
                const wrapper = cc.querySelector(`.memory-synthesis-section[data-turn="${msg.turn}"]`);
                StreamingLifecycle.create(wrapper, { streamId: `memory-${msg.turn}`, theme: 'copper', title: `🧠 Memory Synthesis — ${msg.location_name}`, initialText: 'Analyzing action for memory creation...' });
            }
        }

        function _handleMemSynthChunk(msg) {
            if (msg.turn !== AppState.memorySynthesis.turn) return;
            AppState.memorySynthesis.content = msg.content;
            StreamingLifecycle.update(`memory-${msg.turn}`, Utils.extractReasoning(msg.content));
        }

        function _handleMemSynthComplete(msg) {
            let resultHtml;
            if (msg.memory_created) {
                resultHtml = `<div class="memory-result memory-created"><span class="memory-result-icon">✅</span><span class="memory-result-text">Memory Created: <strong>${Utils.escapeHtml(msg.memory_title || 'Untitled')}</strong></span>${msg.memory_category ? `<span class="memory-category-tag">${Utils.escapeHtml(msg.memory_category)}</span>` : ''}</div>`;
            } else {
                resultHtml = `<div class="memory-result memory-skipped"><span class="memory-result-icon">⏭️</span><span class="memory-result-text">No memory created (action not significant enough)</span></div>`;
            }
            StreamingLifecycle.finalize(`memory-${msg.turn}`, { finalContent: Utils.extractReasoning(msg.content), resultHtml, collapseDelay: CONFIG.COLLAPSE_DELAY });
            AppState.memorySynthesis.turn = null;
            AppState.memorySynthesis.content = '';
        }

        function _handleObjReviewStart(msg) {
            AppState.objectiveReview.turn = msg.turn;
            AppState.objectiveReview.content = '';
            const card = document.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (!card) return;
            const cc = card.querySelector('.card-content');
            if (!cc) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'objective-review-section';
            wrapper.dataset.turn = msg.turn;
            cc.appendChild(wrapper);
            StreamingLifecycle.create(wrapper, { streamId: `objective-${msg.turn}`, theme: 'teal', title: `🎯 Objective Review — Checking ${msg.objective_count} active objectives`, initialText: 'Evaluating objective completion...' });
        }

        function _handleObjReviewChunk(msg) {
            if (msg.turn !== AppState.objectiveReview.turn) return;
            AppState.objectiveReview.content = msg.content;
            StreamingLifecycle.update(`objective-${msg.turn}`, Utils.extractReasoning(msg.content));
        }

        function _handleObjReviewComplete(msg) {
            let resultsHtml = '';
            if (msg.completed_objectives?.length > 0) resultsHtml += `<div class="objective-result objectives-completed"><span class="objective-result-icon">🏆</span><span class="objective-result-text">Completed: ${msg.completed_objectives.map(obj => `<strong>${Utils.escapeHtml(obj.name || obj.id)}</strong>`).join(', ')}</span></div>`;
            if (msg.updates?.length > 0) resultsHtml += `<div class="objective-result objectives-updated"><span class="objective-result-icon">📝</span><span class="objective-result-text">Updated: ${msg.updates.length} objective(s)</span></div>`;
            if ((!msg.completed_objectives || msg.completed_objectives.length === 0) && (!msg.updates || msg.updates.length === 0)) resultsHtml = `<div class="objective-result objectives-unchanged"><span class="objective-result-icon">➡️</span><span class="objective-result-text">No objective changes this turn</span></div>`;
            StreamingLifecycle.finalize(`objective-${msg.turn}`, { finalContent: Utils.extractReasoning(msg.content), resultHtml: resultsHtml, collapseDelay: CONFIG.COLLAPSE_DELAY });
            AppState.objectiveReview.turn = null;
            AppState.objectiveReview.content = '';
        }

        function _handleWebSearchStart(msg) {
            AppState.webSearch.turn = msg.turn;
            const card = document.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (!card) return;
            const cc = card.querySelector('.card-content');
            if (cc) {
                cc.insertAdjacentHTML('beforeend', `<div class="web-search-section" data-turn="${msg.turn}"></div>`);
                const wrapper = cc.querySelector(`.web-search-section[data-turn="${msg.turn}"]`);
                StreamingLifecycle.create(wrapper, { streamId: `websearch-${msg.turn}`, theme: 'blue', title: `🔍 Web Search — ${Utils.escapeHtml(msg.query)}`, initialText: 'Searching the web for puzzle hints...' });
            }
        }

        function _handleWebSearchComplete(msg) {
            let resultHtml;
            if (msg.success) resultHtml = `<div class="memory-result memory-created"><span class="memory-result-icon">🔍</span><span class="memory-result-text">Search complete — results injected into agent context</span></div>`;
            else resultHtml = `<div class="memory-result memory-skipped"><span class="memory-result-icon">⚠️</span><span class="memory-result-text">Search returned no useful results</span></div>`;
            StreamingLifecycle.finalize(`websearch-${msg.turn}`, { finalContent: Utils.escapeHtml(msg.results_summary || 'No details available'), resultHtml, collapseDelay: CONFIG.COLLAPSE_DELAY });
            AppState.webSearch.turn = null;
        }

        function _collapseAfterDelay(card, delay = 1000) {
            setTimeout(() => {
                const sections = card.querySelectorAll('.thinking:not(.collapsed)');
                sections.forEach((section, i) => {
                    setTimeout(() => {
                        section.classList.add('collapsing');
                        requestAnimationFrame(() => {
                            section.classList.add('collapsed');
                            setTimeout(() => section.classList.remove('collapsing'), 500);
                        });
                    }, i * 150);
                });
            }, delay);
        }

        return { connect };
    })();

    /* ================================================================
       Section 24: Polling & State Fetch
       ================================================================ */
    const Poller = (() => {
        let intervalId = null;
        let currentInterval = CONFIG.POLL_INTERVAL;

        function start() {
            fetchNow();
            intervalId = setInterval(fetchNow, currentInterval);
        }

        async function fetchNow() {
            try {
                const response = await fetch('./current_state.json');
                if (!response.ok) { _setConnection(false); return; }
                const newState = await response.json();
                const isFresh = _isTimestampFresh(newState.metadata.timestamp);

                if (AppState.connection.expectedEpisodeId && newState.metadata.episode_id !== AppState.connection.expectedEpisodeId) {
                    _setConnection(isFresh);
                    return;
                }
                if (AppState.connection.expectedEpisodeId && newState.metadata.episode_id === AppState.connection.expectedEpisodeId) {
                    AppState.connection.expectedEpisodeId = null;
                }

                const oldHasPending = AppState.polled?.recent_log?.some(e => e.status === 'pending_ai');
                const newHasPending = newState.recent_log?.some(e => e.status === 'pending_ai');
                const pendingEntry = newState.recent_log?.find(e => e.status === 'pending_ai');

                if (AppState.ui.pendingCardTurn && oldHasPending && !newHasPending) {
                    AppState.ui.aiDataReceivedTime = Date.now();
                }

                if (newHasPending && pendingEntry) AppState.ui.pendingCardTurn = pendingEntry.turn;
                else if (!newHasPending) AppState.ui.pendingCardTurn = null;

                _adjustInterval(newHasPending);

                const episodeChanged = AppState.polled && AppState.polled.metadata.episode_id !== newState.metadata.episode_id;
                if (episodeChanged) AppState.resetEpisode();

                const turnChanged = !AppState.polled || AppState.polled.metadata.turn_count !== newState.metadata.turn_count;
                const pendingChanged = oldHasPending !== newHasPending;

                if (turnChanged || pendingChanged || episodeChanged) {
                    AppState.updatePolled(newState);
                    _updateUI();
                }

                _setConnection(isFresh);
            } catch (e) {
                _setConnection(false);
            }
        }

        function _updateUI() {
            const prev = AppState.previousPolled;
            const curr = AppState.polled;
            if (!curr) return;

            if (DiffEngine.hasHeaderChanged(prev, curr)) HeaderRenderer.update();
            if (DiffEngine.hasInventoryChanged(prev, curr)) InventoryRenderer.update();
            if (DiffEngine.hasObjectivesChanged(prev, curr)) ObjectivesRenderer.update();
            if (DiffEngine.hasTimelineChanged(prev, curr)) TimelineRenderer.update();
            if (DiffEngine.hasMapChanged(prev, curr)) MapRenderer.update();
            if (DiffEngine.hasNavigationChanged(prev, curr)) NavigationRenderer.update();
        }

        function _adjustInterval(hasPending) {
            const target = hasPending ? CONFIG.POLL_FAST : CONFIG.POLL_INTERVAL;
            if (currentInterval !== target) {
                currentInterval = target;
                if (intervalId) clearInterval(intervalId);
                intervalId = setInterval(fetchNow, target);
            }
        }

        function _isTimestampFresh(ts) {
            if (!ts) return false;
            try { return (new Date() - new Date(ts)) / 60000 < CONFIG.STALE_MINUTES; }
            catch { return false; }
        }

        function _setConnection(connected) {
            const dot = document.getElementById('connection-dot');
            const text = document.getElementById('connection-text');
            if (connected) { dot.classList.add('connected'); text.textContent = 'Live'; }
            else { dot.classList.remove('connected'); text.textContent = AppState.polled ? 'Stale' : 'Disconnected'; }
        }

        return { start, fetchNow };
    })();

    /* ================================================================
       Section 29: Panel Divider (leak-fixed)
       ================================================================ */
    const PanelDivider = {
        init() {
            const divider = document.getElementById('panelDivider');
            const cardsPanel = document.getElementById('cardsPanel');
            const mainContent = document.querySelector('.main-content');
            if (!divider || !cardsPanel || !mainContent) return;

            if (window.innerWidth > 1200) {
                const saved = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEY);
                if (saved) cardsPanel.style.width = saved;
            } else {
                cardsPanel.style.width = '';
                divider.style.display = 'none';
            }

            let startX, startWidth;

            const onMove = (e) => {
                const delta = e.clientX - startX;
                const newW = startWidth + delta;
                const containerW = mainContent.offsetWidth;
                const clamped = Math.max(400, Math.min(containerW * 0.8, newW));
                cardsPanel.style.width = clamped + 'px';
                MapRenderer.resize();
            };

            const onUp = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                divider.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEY, cardsPanel.style.width);
                setTimeout(() => { MapRenderer.resize(); MapRenderer.fit(); }, 100);
            };

            divider.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startWidth = cardsPanel.offsetWidth;
                divider.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }
    };

    /* ================================================================
       Section 30: Mobile / Responsive
       ================================================================ */
    const MobileHandler = {
        init() {
            // Event delegation for mobile tabs
            document.getElementById('mobile-tabs')?.addEventListener('click', (e) => {
                const tab = e.target.closest('.mobile-tab');
                if (!tab) return;
                this.switchTab(tab.dataset.tab);
            });

            // Handle resize
            window.addEventListener('resize', () => this._onResize());

            // Initial state
            if (window.innerWidth <= 1200) this._applyMobileState();
        },

        switchTab(tab) {
            const chatPanel = document.getElementById('cardsPanel');
            const mapPanel = document.getElementById('mapPanel');
            const tabs = document.querySelectorAll('.mobile-tab');

            tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

            if (tab === 'chat') {
                chatPanel.dataset.mobileVisible = 'true';
                mapPanel.dataset.mobileVisible = 'false';
            } else {
                chatPanel.dataset.mobileVisible = 'false';
                mapPanel.dataset.mobileVisible = 'true';
                setTimeout(() => { MapRenderer.resize(); MapRenderer.fit(); }, 100);
            }
        },

        _onResize() {
            const chatPanel = document.getElementById('cardsPanel');
            const mapPanel = document.getElementById('mapPanel');
            const divider = document.getElementById('panelDivider');

            if (window.innerWidth > 1200) {
                // Desktop: remove mobile data attributes, restore
                chatPanel.removeAttribute('data-mobile-visible');
                mapPanel.removeAttribute('data-mobile-visible');
                chatPanel.style.display = '';
                mapPanel.style.display = '';
                if (divider) divider.style.display = '';
                const saved = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEY);
                chatPanel.style.width = saved || '';
                // Reset tabs
                document.querySelectorAll('.mobile-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'chat'));
            } else {
                if (divider) divider.style.display = 'none';
                chatPanel.style.width = '';
                this._applyMobileState();
            }
        },

        _applyMobileState() {
            const chatPanel = document.getElementById('cardsPanel');
            const mapPanel = document.getElementById('mapPanel');
            const activeTab = document.querySelector('.mobile-tab.active');
            const tab = activeTab?.dataset.tab || 'chat';
            chatPanel.dataset.mobileVisible = tab === 'chat' ? 'true' : 'false';
            mapPanel.dataset.mobileVisible = tab === 'map' ? 'true' : 'false';
        }
    };

    /* ================================================================
       Section 32: Initialization
       ================================================================ */
    (async function init() {
        // Load room image map
        let roomImageMap = null;
        try {
            const resp = await fetch('./room_images/room_image_map.json');
            if (resp.ok) {
                roomImageMap = await resp.json();
                console.log(`Loaded room image map: ${Object.keys(roomImageMap).length} rooms`);
            }
        } catch (e) { console.warn('Failed to load room image map:', e); }

        TimelineRenderer.setRoomImageMap(roomImageMap);
        MapRenderer.setImageMap(roomImageMap);

        // Event delegation for reasoning toggle
        document.getElementById('timeline')?.addEventListener('click', (e) => {
            const target = e.target.closest('[data-action="toggle-reasoning"]');
            if (target) target.classList.toggle('collapsed');
        });

        // Fullscreen
        document.getElementById('fullscreen-btn')?.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        });

        // Navigation image loading (needs roomImageMap reference)
        const origNavUpdate = NavigationRenderer.update;
        NavigationRenderer.update = function() {
            origNavUpdate.call(this);
            const nav = AppState.polled?.navigation;
            if (nav?.navigation_active && roomImageMap) {
                const img = document.getElementById('navDestinationImg');
                const file = roomImageMap[nav.target_room_id];
                if (img && file) { img.src = `./room_images/${file}`; img.style.display = 'block'; }
            }
        };

        // Init modules
        MapRenderer.init();
        PanelDivider.init();
        MobileHandler.init();
        Poller.start();
        WSHandler.connect();
    })();
    </script>
