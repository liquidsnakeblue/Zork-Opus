    <script>
    /* ================================================================
       Section 18: Constants & Config
       ================================================================ */
    const CONFIG = Object.freeze({
        POLL_INTERVAL: 3000,
        POLL_FAST: 1000,
        WS_RECONNECT_DELAY: 2000,
        WS_MAX_RECONNECT: 10,
        CARD_TRANSITION_DELAY: 4500,
        COLLAPSE_DELAY: 1500,
        STALE_MINUTES: 5,
        LOCAL_STORAGE_KEY: 'zorkgpt-cards-width'
    });

    const ITEM_ICONS = Object.freeze({
        'brass lantern': '🔦', 'lantern': '🔦',
        'glass bottle': '🍶', 'bottle': '🍶',
        'brown sack': '👝', 'sack': '👝',
        'sword': '⚔️', 'elvish sword': '⚔️',
        'knife': '🔪', 'nasty knife': '🔪',
        'rope': '🪢', 'key': '🔑',
        'egg': '🥚', 'jewel': '💎',
        'gold': '🪙', 'coin': '🪙', 'pot': '🪙',
        'food': '🍖', 'garlic': '🧄',
        'water': '💧', 'map': '🗺️',
        'torch': '🔥', 'leaflet': '📜',
        'painting': '🖼️', 'default': '📦'
    });

    /* ================================================================
       Section 31: Utilities
       ================================================================ */
    const Utils = {
        escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        extractReasoning(content) {
            if (!content) return '';
            try {
                const parsed = JSON.parse(content);
                if (parsed.reasoning) return parsed.reasoning;
            } catch (e) { /* not complete JSON */ }
            const match = content.match(/"reasoning"\s*:\s*"((?:[^"\\]|\\.)*)(?:"|$)/);
            if (match) {
                return match[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
            }
            const trimmed = content.trim();
            if (trimmed.startsWith('{') && !trimmed.endsWith('}')) return 'Analyzing...';
            return content;
        },

        getItemIcon(itemName) {
            const lower = itemName.toLowerCase();
            for (const [key, icon] of Object.entries(ITEM_ICONS)) {
                if (lower.includes(key)) return icon;
            }
            return ITEM_ICONS.default;
        },

        abbreviateDirection(direction) {
            const map = {
                'north': 'N', 'south': 'S', 'east': 'E', 'west': 'W',
                'northeast': 'NE', 'northwest': 'NW', 'southeast': 'SE', 'southwest': 'SW',
                'up': 'U', 'down': 'D', 'in': 'IN', 'out': 'OUT'
            };
            const lower = (direction || '').toLowerCase();
            return map[lower] || direction.toUpperCase().slice(0, 2);
        },

        getWebSocketUrl() {
            const params = new URLSearchParams(window.location.search);
            const custom = params.get('ws');
            if (custom) return custom;
            const host = window.location.hostname || 'localhost';
            return `ws://${host}:8765`;
        }
    };

    /* ================================================================
       Section 19: State Management
       ================================================================ */
    const AppState = (() => {
        const _state = {
            polled: null,
            previousPolled: null,
            streaming: { currentTurn: null, reasoning: '', followup: false, followupReasoning: '' },
            reasoner: { currentTurn: null, reasoning: '' },
            memorySynthesis: { turn: null, content: '' },
            objectiveReview: { turn: null, content: '' },
            webSearch: { turn: null },
            ui: {
                lastTurnCount: null,
                lastMapHash: null,
                pendingCardTurn: null,
                aiDataReceivedTime: null,
                lastCompletedStreamingTurn: null
            },
            connection: {
                wsConnected: false,
                pollConnected: false,
                expectedEpisodeId: null
            }
        };

        return {
            get polled() { return _state.polled; },
            get previousPolled() { return _state.previousPolled; },
            get streaming() { return _state.streaming; },
            get reasoner() { return _state.reasoner; },
            get memorySynthesis() { return _state.memorySynthesis; },
            get objectiveReview() { return _state.objectiveReview; },
            get webSearch() { return _state.webSearch; },
            get ui() { return _state.ui; },
            get connection() { return _state.connection; },

            updatePolled(newState) {
                _state.previousPolled = _state.polled;
                _state.polled = newState;
            },

            resetEpisode() {
                _state.streaming = { currentTurn: null, reasoning: '', followup: false, followupReasoning: '' };
                _state.reasoner = { currentTurn: null, reasoning: '' };
                _state.memorySynthesis = { turn: null, content: '' };
                _state.objectiveReview = { turn: null, content: '' };
                _state.webSearch = { turn: null };
                _state.ui.pendingCardTurn = null;
                _state.ui.aiDataReceivedTime = null;
                _state.ui.lastTurnCount = null;
                _state.ui.lastCompletedStreamingTurn = null;
            }
        };
    })();

    /* ================================================================
       Section 21: Diff Engine
       ================================================================ */
    const DiffEngine = {
        hasHeaderChanged(prev, curr) {
            if (!prev || !curr) return true;
            const pm = prev.metadata, cm = curr.metadata;
            const pc = prev.current_state, cc = curr.current_state;
            return pm.score !== cm.score || pm.turn_count !== cm.turn_count ||
                   (pc.death_count || 0) !== (cc.death_count || 0) ||
                   pm.generation !== cm.generation || pm.high_score !== cm.high_score;
        },

        hasInventoryChanged(prev, curr) {
            if (!prev || !curr) return true;
            const pi = prev.current_state.inventory || [];
            const ci = curr.current_state.inventory || [];
            if (pi.length !== ci.length) return true;
            return pi.some((item, i) => item !== ci[i]);
        },

        hasObjectivesChanged(prev, curr) {
            if (!prev || !curr) return true;
            return JSON.stringify(prev.current_state.objectives) !== JSON.stringify(curr.current_state.objectives);
        },

        hasTimelineChanged(prev, curr) {
            if (!prev || !curr) return true;
            if (prev.metadata.turn_count !== curr.metadata.turn_count) return true;
            const prevPending = prev.recent_log?.some(e => e.status === 'pending_ai');
            const currPending = curr.recent_log?.some(e => e.status === 'pending_ai');
            return prevPending !== currPending;
        },

        hasMapChanged(prev, curr) {
            if (!prev || !curr) return true;
            const pm = prev.map, cm = curr.map;
            if (!pm || !cm) return true;
            return pm.total_rooms !== cm.total_rooms ||
                   pm.total_connections !== cm.total_connections ||
                   pm.current_room_id !== cm.current_room_id ||
                   JSON.stringify(pm.raw_data?.connections) !== JSON.stringify(cm.raw_data?.connections);
        },

        hasNavigationChanged(prev, curr) {
            if (!prev || !curr) return true;
            return JSON.stringify(prev.navigation) !== JSON.stringify(curr.navigation);
        }
    };

    /* ================================================================
       Section 20: Template Engine
       ================================================================ */
    const Templates = {
        collapsibleReasoning(text, title = 'AI Reasoning', startExpanded = false, theme = '') {
            if (!text) return '';
            const words = text.trim().split(/\s+/);
            const wordCount = words.length;
            const collapsedClass = startExpanded ? '' : 'collapsed';
            const themeClass = theme ? ` theme-${theme}` : '';

            return `
                <div class="thinking ai-section ${collapsedClass}${themeClass}" data-action="toggle-reasoning">
                    <div class="thinking-header">
                        <div class="thinking-header-left">
                            <span class="thinking-toggle">▼</span>
                            <span>${Utils.escapeHtml(title)}</span>
                            <span class="thinking-word-count">${wordCount} words</span>
                        </div>
                    </div>
                    <div class="thinking-content">
                        <p class="thinking-text">${Utils.escapeHtml(text.trim())}</p>
                    </div>
                </div>
            `;
        },

        buildAISection(entry, isNewestCard, toolHistory) {
            if (entry.status === 'pending_ai') {
                return `
                    <div class="thinking-placeholder">
                        <div class="thinking-dots"><span></span><span></span><span></span></div>
                        <span class="thinking-text">AI is analyzing the situation...</span>
                    </div>
                `;
            }

            if (entry.objective_selection) {
                const objSel = entry.objective_selection;
                const firstHtml = entry.reasoning ? this.collapsibleReasoning(entry.reasoning, 'Objective Selection', false, 'gold') : '';
                const annotation = `
                    <div class="tool-annotation objective" data-tool="objective">
                        <span class="annotation-icon">🎯</span>
                        <span class="annotation-text">Selected: ${Utils.escapeHtml(objSel.objective_id)} - ${Utils.escapeHtml(objSel.objective_text)}</span>
                    </div>
                `;
                const followupHtml = objSel.followup_reasoning ? this.collapsibleReasoning(objSel.followup_reasoning, 'Follow-up Reasoning', false, 'green') : '';
                const actionHtml = entry.action ? `
                    <div class="ai-action ai-section">
                        <div class="ai-action-header">AI Action</div>
                        <p class="ai-action-text">${Utils.escapeHtml(entry.action)}</p>
                    </div>
                ` : '';
                return firstHtml + annotation + followupHtml + actionHtml;
            }

            const thinking = entry.reasoning ? this.collapsibleReasoning(entry.reasoning, 'AI Reasoning', false, 'gold') : '';
            const aiAction = entry.action ? `
                <div class="ai-action ai-section">
                    <div class="ai-action-header">AI Action</div>
                    <p class="ai-action-text">${Utils.escapeHtml(entry.action)}</p>
                </div>
            ` : '';
            let toolAnnotations = '';
            if (isNewestCard && toolHistory && toolHistory.length > 0) {
                toolAnnotations = this.buildToolAnnotations(toolHistory);
            }
            return thinking + aiAction + toolAnnotations;
        },

        buildToolAnnotations(history) {
            if (!history || history.length === 0) return '';
            return history.map(result => {
                if (result.tool === 'pathfinder') {
                    const icon = result.success ? '✓' : '✗';
                    return `<div class="tool-annotation pathfinder"><span class="annotation-icon">${icon}</span><span>Pathfinder:</span><span class="annotation-text">${Utils.escapeHtml(result.path || 'No path found')} → ${Utils.escapeHtml(result.target || '')}</span></div>`;
                } else if (result.tool === 'objective') {
                    return `<div class="tool-annotation objective"><span class="annotation-icon">🎯</span><span>Objective:</span><span class="annotation-text">${Utils.escapeHtml(result.objective || result.objective_id)}</span></div>`;
                }
                return '';
            }).join('');
        },

        buildMemorySynthesisFromLog(memorySynthesis, turn) {
            if (!memorySynthesis) return '';
            const content = Utils.extractReasoning(memorySynthesis.content || '');
            const wordCount = content.trim().split(/\s+/).length;

            let resultHtml;
            if (memorySynthesis.memory_created) {
                resultHtml = `<div class="memory-result memory-created"><span class="memory-result-icon">✅</span><span class="memory-result-text">Memory Created: <strong>${Utils.escapeHtml(memorySynthesis.memory_title || 'Untitled')}</strong></span>${memorySynthesis.memory_category ? `<span class="memory-category-tag">${Utils.escapeHtml(memorySynthesis.memory_category)}</span>` : ''}</div>`;
            } else {
                resultHtml = `<div class="memory-result memory-skipped"><span class="memory-result-icon">⏭️</span><span class="memory-result-text">No memory created (action not significant enough)</span></div>`;
            }

            return `
                <div class="memory-synthesis-section" data-turn="${turn}">
                    <div class="thinking ai-section collapsed theme-copper" data-action="toggle-reasoning">
                        <div class="thinking-header">
                            <div class="thinking-header-left">
                                <span class="thinking-toggle">▼</span>
                                <span>🧠 Memory Synthesis</span>
                                <span class="thinking-word-count">${wordCount} words</span>
                            </div>
                        </div>
                        <div class="thinking-content">
                            <p class="thinking-text">${Utils.escapeHtml(content.trim())}</p>
                        </div>
                    </div>
                    ${resultHtml}
                </div>
            `;
        },

        buildObjectiveReviewFromLog(objectiveReview, turn) {
            if (!objectiveReview) return '';
            const content = Utils.extractReasoning(objectiveReview.content || '');
            const wordCount = content.trim().split(/\s+/).length;
            const completedObjectives = objectiveReview.completed_objectives || [];
            const updates = objectiveReview.updates || [];

            let resultsHtml = '';
            if (completedObjectives.length > 0) {
                resultsHtml += `<div class="objective-result objectives-completed"><span class="objective-result-icon">🏆</span><span class="objective-result-text">Completed: ${completedObjectives.map(obj => `<strong>${Utils.escapeHtml(obj.name || obj.id)}</strong>`).join(', ')}</span></div>`;
            }
            if (updates.length > 0) {
                resultsHtml += `<div class="objective-result objectives-updated"><span class="objective-result-icon">📝</span><span class="objective-result-text">Updated: ${updates.length} objective(s)</span></div>`;
            }
            if (completedObjectives.length === 0 && updates.length === 0) {
                resultsHtml = `<div class="objective-result objectives-unchanged"><span class="objective-result-icon">➡️</span><span class="objective-result-text">No objective changes this turn</span></div>`;
            }

            return `
                <div class="objective-review-section" data-turn="${turn}">
                    <div class="thinking ai-section collapsed theme-teal" data-action="toggle-reasoning">
                        <div class="thinking-header">
                            <div class="thinking-header-left">
                                <span class="thinking-toggle">▼</span>
                                <span>🎯 Objective Review</span>
                                <span class="thinking-word-count">${wordCount} words</span>
                            </div>
                        </div>
                        <div class="thinking-content">
                            <p class="thinking-text">${Utils.escapeHtml(content.trim())}</p>
                        </div>
                    </div>
                    ${resultsHtml}
                </div>
            `;
        },

        buildReasonerCardFromEvent(event) {
            const reasoningHtml = event.reasoning ? this.collapsibleReasoning(event.reasoning, 'Strategic Analysis', false, 'purple') : '';
            let approachHtml = '';
            if (event.suggested_approach) {
                approachHtml = `<div class="outcome suggested-approach"><div class="outcome-header">🧭 Suggested Approach (Next 10 Turns)</div><p class="outcome-text">${Utils.escapeHtml(event.suggested_approach)}</p></div>`;
            }

            let objectivesHtml = '';
            if (event.objectives && event.objectives.length > 0) {
                objectivesHtml = `
                    <div class="outcome">
                        <div class="outcome-header">🎯 Discovered Objectives (${event.objectives.length})</div>
                        <div class="objectives-list">
                            ${event.objectives.map(obj => `
                                <div class="objective-item">
                                    <span class="objective-id">${Utils.escapeHtml(obj.id)}</span>
                                    <span class="objective-name">${Utils.escapeHtml(obj.name)}</span>
                                    <span class="objective-category ${obj.category}">${obj.category}</span>
                                    <p class="objective-text">${Utils.escapeHtml(obj.text)}</p>
                                    ${obj.completion_condition ? `<p class="objective-completion">✓ Complete when: ${Utils.escapeHtml(obj.completion_condition)}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                objectivesHtml = `<div class="outcome"><div class="outcome-header">Objectives</div><p class="outcome-text">No new objectives discovered.</p></div>`;
            }

            return `
                <div class="card reasoner-card" data-reasoner-turn="${event.turn}">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon">🧠</div>
                            <div>
                                <div class="card-label">Deep Reasoner</div>
                                <div class="trigger-reason">${Utils.escapeHtml(event.trigger_reason)}</div>
                            </div>
                        </div>
                        <div class="card-turn">Turn ${event.turn}</div>
                    </div>
                    <div class="card-content">
                        ${reasoningHtml}
                        ${approachHtml}
                        ${objectivesHtml}
                    </div>
                </div>
            `;
        }
    };

    /* ================================================================
       Section 23: Streaming Section Lifecycle
       ================================================================ */
    const StreamingLifecycle = {
        create(container, { streamId, theme, title, initialText = 'Analyzing...' }) {
            const html = `
                <div class="thinking ai-section streaming theme-${theme}" data-stream-id="${streamId}" data-action="toggle-reasoning">
                    <div class="thinking-header">
                        <div class="thinking-header-left">
                            <span class="thinking-toggle">▼</span>
                            <span class="streaming-dots"><span></span><span></span><span></span></span>
                            <span>${Utils.escapeHtml(title)}</span>
                            <span class="thinking-word-count">0 words</span>
                        </div>
                    </div>
                    <div class="thinking-content">
                        <p class="thinking-text">${Utils.escapeHtml(initialText)}</p>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            return container.querySelector(`[data-stream-id="${streamId}"]`);
        },

        update(streamId, content) {
            const section = document.querySelector(`[data-stream-id="${streamId}"]`);
            if (!section) return;
            const textEl = section.querySelector('.thinking-text');
            if (textEl) textEl.textContent = content;
            const wordCount = (content || '').trim().split(/\s+/).length;
            const wcEl = section.querySelector('.thinking-word-count');
            if (wcEl) wcEl.textContent = `${wordCount} words`;
            const tc = section.querySelector('.thinking-content');
            if (tc) tc.scrollTop = tc.scrollHeight;
        },

        finalize(streamId, { finalContent, resultHtml, collapseDelay = CONFIG.COLLAPSE_DELAY } = {}) {
            const section = document.querySelector(`[data-stream-id="${streamId}"]`);
            if (!section) return;
            const dots = section.querySelector('.streaming-dots');
            if (dots) dots.remove();
            section.classList.remove('streaming');
            if (finalContent) {
                const textEl = section.querySelector('.thinking-text');
                if (textEl) textEl.textContent = finalContent;
                const wordCount = finalContent.trim().split(/\s+/).length;
                const wcEl = section.querySelector('.thinking-word-count');
                if (wcEl) wcEl.textContent = `${wordCount} words`;
            }
            if (resultHtml) section.insertAdjacentHTML('afterend', resultHtml);
            if (collapseDelay > 0) {
                setTimeout(() => {
                    section.classList.add('collapsing');
                    requestAnimationFrame(() => {
                        section.classList.add('collapsed');
                        setTimeout(() => section.classList.remove('collapsing'), 500);
                    });
                }, collapseDelay);
            }
        }
    };

    /* ================================================================
       Section 25: Header/Inventory/Objectives Renderers
       ================================================================ */
    const HeaderRenderer = {
        update() {
            const state = AppState.polled;
            if (!state) return;
            const meta = state.metadata;
            const current = state.current_state;

            document.getElementById('score').textContent = meta.score;
            document.getElementById('turn-count').textContent = `${meta.turn_count}/${meta.max_turns}`;
            document.getElementById('death-count').textContent = current.death_count || 0;

            const genEl = document.getElementById('generation-num');
            if (genEl && meta.generation !== undefined) genEl.textContent = meta.generation;

            if (highScoreEl && meta.high_score !== undefined) {

                highScoreEl.textContent = meta.high_score;
                if (meta.high_score > old) {
                    highScoreEl.classList.add('new-record');
                    setTimeout(() => highScoreEl.classList.remove('new-record'), 3000);
                }
            }
        }
    };

    const InventoryRenderer = {
        update() {
            const state = AppState.polled;
            if (!state) return;
            const inventory = state.current_state.inventory || [];
            const container = document.getElementById('inventory-items');
            if (inventory.length === 0) {
                container.innerHTML = '<span class="inventory-empty">Empty</span>';
                return;
            }
            container.innerHTML = inventory.map(item => `
                <div class="inv-chip">
                    <span class="inv-chip-icon">${Utils.getItemIcon(item)}</span>
                    ${Utils.escapeHtml(item)}
                </div>
            `).join('');
        }
    };

    const ObjectivesRenderer = {
        update() {
            const state = AppState.polled;
            if (!state) return;
            const objectives = state.current_state.objectives || [];
            const container = document.getElementById('objectives-chips');
            const currentTurn = state.metadata?.turn_count || 0;

            if (objectives.length === 0) {
                container.innerHTML = '<span class="objectives-empty-chip">None yet</span>';
                return;
            }

            const sorted = [...objectives].sort((a, b) => {
                const order = { 'in_progress': 0, 'pending': 1, 'completed': 2 };
                const oa = order[a.status] ?? 1, ob = order[b.status] ?? 1;
                if (oa !== ob) return oa - ob;
                if (a.status === 'pending' && b.status === 'pending') {
                    const td = (a.created_turn || 0) - (b.created_turn || 0);
                    return td !== 0 ? td : (a.id || '').localeCompare(b.id || '');
                }
                if (a.status === 'completed' && b.status === 'completed') {
                    return (b.completed_turn || 0) - (a.completed_turn || 0);
                }
                return 0;
            });

            const active = sorted.filter(o => o.status !== 'completed');
            const recent = sorted.filter(o => {
                if (o.status !== 'completed') return false;
                return currentTurn - (o.completed_turn || 0) <= 7;
            });
            const display = [...active, ...recent];

            if (display.length === 0) {
                container.innerHTML = '<span class="objectives-empty-chip">All done!</span>';
                return;
            }

            container.innerHTML = display.map(obj => {
                let fadeClass = '';
                if (obj.status === 'completed') {
                    const since = currentTurn - (obj.completed_turn || 0);
                    if (since === 6) fadeClass = 'fading-1';
                    else if (since === 7) fadeClass = 'fading-2';
                }
                const tip = (obj.text || '') + (obj.completion_condition ? `\n✓ Complete when: ${obj.completion_condition}` : '');
                return `<div class="obj-chip ${obj.status} ${fadeClass}" data-id="${obj.id}" title="${Utils.escapeHtml(tip)}"><span class="obj-chip-dot"></span><span class="obj-chip-name">${Utils.escapeHtml(obj.name || obj.id)}</span></div>`;
            }).join('');
        }
    };

    /* ================================================================
       Section 26: Timeline Renderer (incremental rendering)
       ================================================================ */
    const TimelineRenderer = (() => {
        const _renderedTurns = new Map(); // turn -> { element, hash }
        let _roomImageMap = null;

        function setRoomImageMap(map) { _roomImageMap = map; }

        function _computeHash(entry) {
            return `${entry.turn}|${entry.status || 'complete'}|${entry.action || ''}|${entry.memory_synthesis ? 1 : 0}|${entry.objective_review ? 1 : 0}`;
        }

        function _buildCardHtml(entry, isRoomChange, roomName, imagePath, hasImage, isNewestCard) {
            const isPending = entry.status === 'pending_ai';
            const cardClasses = ['card'];
            if (isRoomChange) cardClasses.push('room-change-card');
            if (isPending) cardClasses.push('pending-ai');

            const aiSection = Templates.buildAISection(entry, isNewestCard, AppState.polled?.tool_status?.history);
            const memorySynthesisSection = entry.memory_synthesis ? Templates.buildMemorySynthesisFromLog(entry.memory_synthesis, entry.turn) : '';
            const objectiveReviewSection = entry.objective_review ? Templates.buildObjectiveReviewFromLog(entry.objective_review, entry.turn) : '';

            const roomChangeLabel = isRoomChange ? `<span class="room-change">${Utils.escapeHtml(roomName)}</span>` : '';

            const imageHtml = hasImage ? `
                <div class="card-image">
                    <img src="${imagePath}" alt="${roomName}" onerror="this.parentElement.classList.add('no-image'); this.parentElement.innerHTML='<svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/></svg><span>No image</span>'"/>
                </div>
            ` : `
                <div class="card-image no-image">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    <span>No image</span>
                </div>
            `;

            return `
                <article class="${cardClasses.join(' ')}" data-turn="${entry.turn}" data-status="${entry.status || 'complete'}">
                    ${imageHtml}
                    <div class="card-content">
                        <div class="card-header">
                            ${roomChangeLabel}
                            <span class="turn-badge">Turn ${entry.turn}</span>
                        </div>
                        <div class="outcome">
                            <div class="outcome-header">Game Response</div>
                            <p class="outcome-text">${Utils.escapeHtml(entry.zork_response)}</p>
                        </div>
                        ${aiSection}
                        ${memorySynthesisSection}
                        ${objectiveReviewSection}
                    </div>
                </article>
            `;
        }

        function update() {
            const state = AppState.polled;
            if (!state) return;
            const logs = state.recent_log || [];
            const container = document.getElementById('timeline');
            const currentRoomId = state.map?.current_room_id;
            const currentTurnCount = state.metadata?.turn_count || 0;

            if (logs.length === 0) {
                container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>No actions yet</span></div>`;
                AppState.ui.lastTurnCount = null;
                _renderedTurns.clear();
                return;
            }

            const isNewTurn = AppState.ui.lastTurnCount !== null && currentTurnCount > AppState.ui.lastTurnCount;
            AppState.ui.lastTurnCount = currentTurnCount;

            // Skip rebuild if streaming just completed this turn
            if (AppState.ui.lastCompletedStreamingTurn === currentTurnCount) {
                AppState.ui.lastCompletedStreamingTurn = null;
                const existing = container.querySelector(`.card[data-turn="${currentTurnCount}"]`);
                if (existing && existing.dataset.status === 'complete') return;
            }

            // Calculate result rooms
            const logsWithResultRoom = logs.map((entry, idx) => {
                const resultRoomId = idx < logs.length - 1 ? logs[idx + 1].location_id : currentRoomId;
                return { ...entry, resultRoomId };
            });

            const displayLogs = logsWithResultRoom.reverse();

            // Preserve streaming sections
            const preservedSections = {};
            const preservedReasonerCards = [];
            container.querySelectorAll('.memory-synthesis-section, .objective-review-section').forEach(section => {
                const turn = section.dataset.turn;
                if (turn) {
                    if (!preservedSections[turn]) preservedSections[turn] = {};
                    if (section.classList.contains('memory-synthesis-section')) preservedSections[turn].memory = section.cloneNode(true);
                    else if (section.classList.contains('objective-review-section')) preservedSections[turn].objective = section.cloneNode(true);
                }
            });
            container.querySelectorAll('.reasoner-card').forEach(card => {
                if (card.querySelector('.thinking.streaming')) preservedReasonerCards.push(card.cloneNode(true));
            });

            // Build all cards
            let prevResultRoomId = null;
            const cardsHtml = displayLogs.map((entry, idx) => {
                const resultRoomId = entry.resultRoomId;
                const isRoomChange = resultRoomId !== prevResultRoomId;
                prevResultRoomId = resultRoomId;
                const isNewestCard = idx === 0;
                const hasImage = _roomImageMap && _roomImageMap[resultRoomId];
                const imagePath = hasImage ? `./room_images/${_roomImageMap[resultRoomId]}` : null;
                const roomName = entry.extracted_info?.current_location_name || entry.location_name || 'Unknown';
                return _buildCardHtml(entry, isRoomChange, roomName, imagePath, hasImage, isNewestCard);
            }).join('');

            // Apply to DOM
            if (isNewTurn && container.children.length > 0) {
                setTimeout(() => {
                    container.innerHTML = cardsHtml;
                    _restorePreserved(container, preservedSections, preservedReasonerCards);
                    _insertReasonerCards(container);
                    container.scrollTop = 0;
                    const newCard = container.querySelector('.card');
                    if (newCard) {
                        newCard.classList.add('entering');
                        setTimeout(() => newCard.classList.remove('entering'), 2100);
                    }
                }, 100);
            } else {
                container.innerHTML = cardsHtml;
                _restorePreserved(container, preservedSections, preservedReasonerCards);
                _insertReasonerCards(container);
                if (container.children.length > 0) {
                    const firstCard = container.querySelector('.card');
                    if (firstCard && !firstCard.classList.contains('entering') && AppState.ui.lastTurnCount === currentTurnCount && !AppState.previousPolled) {
                        firstCard.classList.add('entering');
                        setTimeout(() => firstCard.classList.remove('entering'), 2100);
                    }
                }
            }
        }

        function _restorePreserved(container, sections, reasonerCards) {
            for (const [turn, data] of Object.entries(sections)) {
                const card = container.querySelector(`.card[data-turn="${turn}"]`);
                if (card) {
                    const cc = card.querySelector('.card-content');
                    if (cc) {
                        if (data.memory && !cc.querySelector('.memory-synthesis-section')) cc.appendChild(data.memory);
                        if (data.objective && !cc.querySelector('.objective-review-section')) cc.appendChild(data.objective);
                    }
                }
            }
            reasonerCards.forEach(card => {
                const rt = card.dataset.reasonerTurn;
                if (rt && !container.querySelector(`.reasoner-card[data-reasoner-turn="${rt}"]`)) {
                    const tc = container.querySelector(`.card[data-turn="${rt}"]`);
                    if (tc) tc.parentNode.insertBefore(card, tc);
                    else container.appendChild(card);
                }
            });
        }

        function _insertReasonerCards(container) {
            const events = AppState.polled?.reasoner_events || [];
            if (events.length === 0) return;
            const displayed = container.querySelectorAll('.card[data-turn]');
            if (displayed.length === 0) return;
            let minTurn = Infinity, maxTurn = -Infinity;
            displayed.forEach(c => {
                const t = parseInt(c.dataset.turn);
                if (t < minTurn) minTurn = t;
                if (t > maxTurn) maxTurn = t;
            });
            events.forEach(event => {
                if (event.turn < minTurn || event.turn > maxTurn) return;
                if (container.querySelector(`.reasoner-card[data-reasoner-turn="${event.turn}"]`)) return;
                const html = Templates.buildReasonerCardFromEvent(event);
                const turnCard = container.querySelector(`.card[data-turn="${event.turn}"]`);
                if (turnCard) {
                    turnCard.insertAdjacentHTML('beforebegin', html);
                } else {
                    const all = container.querySelectorAll('.card[data-turn]');
                    let inserted = false;
                    for (const c of all) {
                        if (parseInt(c.dataset.turn) < event.turn) {
                            c.insertAdjacentHTML('beforebegin', html);
                            inserted = true;
                            break;
                        }
                    }
                    if (!inserted) container.insertAdjacentHTML('beforeend', html);
                }
            });
        }

        function clear() {
            _renderedTurns.clear();
            const container = document.getElementById('timeline');
            if (container) container.innerHTML = '';
        }

        return { update, clear, setRoomImageMap };
    })();

    /* ================================================================
       Section 27: Map Renderer (Cytoscape)
       ================================================================ */
    const MapRenderer = (() => {
        let cy = null;
        let roomImageMap = null;

        function init() {
            const container = document.getElementById('map-diagram');
            const cyContainer = document.createElement('div');
            cyContainer.id = 'cytoscape-map';
            const loading = container.querySelector('.loading');

            container.insertBefore(cyContainer, container.firstChild);

            const styles = getComputedStyle(document.documentElement);
            const bgCard = styles.getPropertyValue('--bg-card').trim();
            const borderColor = styles.getPropertyValue('--border-color').trim();
            const textSecondary = styles.getPropertyValue('--text-secondary').trim();
            const bgPrimary = styles.getPropertyValue('--bg-primary').trim();
            const textDim = styles.getPropertyValue('--text-dim').trim();
            const accentGold = styles.getPropertyValue('--accent-gold').trim();

            cy = cytoscape({
                container: document.getElementById('cytoscape-map'),
                style: [
                    { selector: 'node', style: {
                        'width': 70, 'height': 70, 'shape': 'round-rectangle',
                        'background-fit': 'cover', 'background-color': bgCard,
                        'border-width': 2, 'border-color': borderColor,
                        'label': 'data(label)', 'text-valign': 'bottom', 'text-halign': 'center',
                        'text-margin-y': 6, 'font-size': 10,
                        'font-family': 'JetBrains Mono, Monaco, Consolas, monospace',
                        'color': textSecondary, 'text-wrap': 'wrap', 'text-max-width': 80,
                        'text-background-color': bgPrimary, 'text-background-opacity': 0.8,
                        'text-background-padding': 2, 'text-background-shape': 'roundrectangle'
                    }},
                    { selector: 'node[hasImage]', style: { 'background-image': 'data(imageUrl)', 'background-fit': 'cover' }},
                    { selector: 'node.current', style: {
                        'border-width': 4, 'border-color': accentGold, 'z-index': 999,
                        'shadow-blur': 15, 'shadow-color': 'rgba(212, 168, 75, 0.5)', 'shadow-opacity': 0.8
                    }},
                    { selector: 'node.neighbor', style: { 'border-width': 3, 'border-color': '#4a9a6a', 'background-color': '#2a4a3a', 'z-index': 100 }},
                    { selector: 'edge.neighbor-edge', style: {
                        'line-color': '#4a9a6a', 'width': 3, 'z-index': 100,
                        'label': 'data(label)', 'font-size': 10, 'font-weight': 'bold',
                        'color': '#7ac99a', 'text-background-color': '#1a1a1a',
                        'text-background-opacity': 0.85, 'text-background-padding': '3px', 'text-margin-y': -8
                    }},
                    { selector: 'node:selected', style: { 'border-color': '#6b9fc4', 'border-width': 3 }},
                    { selector: 'edge', style: {
                        'width': 2, 'line-color': textDim, 'target-arrow-color': textDim,
                        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.7
                    }},
                    { selector: 'edge.highlighted', style: { 'line-color': accentGold, 'target-arrow-color': accentGold, 'width': 3 }},
                    { selector: 'node.maze', style: { 'width': 50, 'height': 50, 'background-color': '#2a2520', 'border-color': '#3a342e', 'font-size': 8 }},
                    { selector: 'node.deadend', style: { 'width': 45, 'height': 45, 'background-color': '#332820', 'border-style': 'dashed' }},
                    { selector: 'node.hover', style: { 'border-color': '#6b9fc4', 'border-width': 3 }},
                    { selector: 'edge.neighbor', style: { 'line-color': '#6b9fc4', 'target-arrow-color': '#6b9fc4', 'width': 3, 'z-index': 100 }}
                ],
                layout: { name: 'preset' },
                minZoom: 0.1, maxZoom: 3, wheelSensitivity: 0.2
            });

            cy.userPanningEnabled(true);
            cy.userZoomingEnabled(true);
            _initControls();
            _initHoverEffects();
        }

        function _initControls() {
            document.getElementById('zoom-in-btn')?.addEventListener('click', () => {
                cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } });
            });
            document.getElementById('zoom-out-btn')?.addEventListener('click', () => {
                cy.zoom({ level: cy.zoom() * 0.7, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } });
            });
            document.getElementById('fit-btn')?.addEventListener('click', () => cy.fit(undefined, 30));
            document.getElementById('center-btn')?.addEventListener('click', () => {
                const curr = cy.nodes('.current');
                if (curr.length > 0) cy.animate({ center: { eles: curr }, zoom: 1.2, duration: 500, easing: 'ease-in-out-cubic' });
            });
        }

        function _initHoverEffects() {
            cy.on('mouseover', 'node', evt => {
                const node = evt.target;
                node.addClass('hover');
                node.neighborhood().edges().addClass('neighbor');
                node.neighborhood().nodes().addClass('neighbor');
            });
            cy.on('mouseout', 'node', evt => {
                const node = evt.target;
                node.removeClass('hover');
                node.neighborhood().edges().removeClass('neighbor');
                node.neighborhood().nodes().removeClass('neighbor');
            });
        }

        function _calculateBFS(startId, connections, rooms) {
            const distances = {};
            const visited = new Set();
            if (!startId || !rooms[startId]) {
                Object.keys(rooms).forEach(id => distances[id] = 0);
                return distances;
            }
            const sid = startId.toString();
            distances[sid] = 0;
            visited.add(sid);
            const queue = [sid];
            while (queue.length > 0) {
                const cur = queue.shift();
                const d = distances[cur];
                Object.values(connections[cur] || {}).forEach(tid => {
                    const ts = tid.toString();
                    if (!visited.has(ts)) {
                        visited.add(ts);
                        distances[ts] = d + 1;
                        queue.push(ts);
                    }
                });
            }
            const maxD = Math.max(...Object.values(distances), 0) + 1;
            Object.keys(rooms).forEach(id => { if (distances[id] === undefined) distances[id] = maxD; });
            return distances;
        }

        function rebuild(mapData) {
            if (!cy) return;
            const rooms = mapData.raw_data.rooms || {};
            const connections = mapData.raw_data.connections || {};
            const currentRoomId = mapData.current_room_id;
            const distances = _calculateBFS(currentRoomId, connections, rooms);

            const nodes = [];
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                const imageFile = roomImageMap && roomImageMap[roomId];
                const hasImage = !!imageFile;
                const roomName = (room.name || '').toLowerCase();
                const distance = distances[roomId] !== undefined ? distances[roomId] : 999;
                const classes = [];
                if (roomId == currentRoomId) classes.push('current');
                else if (distance === 1) classes.push('neighbor');
                if (roomName.includes('maze')) classes.push('maze');
                if (roomName.includes('dead end')) classes.push('deadend');

                nodes.push({
                    data: {
                        id: `room-${roomId}`, roomId, label: room.name || `Room ${roomId}`,
                        hasImage: hasImage ? 'yes' : undefined,
                        imageUrl: hasImage ? `./room_images/${imageFile}` : null,
                        distance
                    },
                    classes: classes.join(' ')
                });
            });

            const edges = [];
            const edgeSet = new Set();
            const curStr = currentRoomId ? currentRoomId.toString() : null;
            const dirLabels = {};
            if (curStr && connections[curStr]) {
                Object.entries(connections[curStr]).forEach(([dir, toId]) => {
                    const k = `${curStr}-${toId}`;
                    const r = `${toId}-${curStr}`;
                    const abbrev = Utils.abbreviateDirection(dir);
                    dirLabels[k] = abbrev;
                    dirLabels[r] = abbrev;
                });
            }
            Object.entries(connections).forEach(([fromId, exits]) => {
                Object.entries(exits).forEach(([dir, toId]) => {
                    const k = `${fromId}-${toId}`;
                    const r = `${toId}-${fromId}`;
                    if (!edgeSet.has(k)) {
                        edgeSet.add(k);
                        edgeSet.add(r);
                        const isNE = (fromId === curStr || toId.toString() === curStr);
                        const label = isNE ? (dirLabels[k] || dirLabels[r] || '') : '';
                        edges.push({
                            data: { id: `edge-${fromId}-${toId}`, source: `room-${fromId}`, target: `room-${toId}`, label },
                            classes: isNE ? 'neighbor-edge' : ''
                        });
                    }
                });
            });

            cy.elements().remove();
            cy.add([...nodes, ...edges]);

            cy.layout({
                name: 'breadthfirst',
                roots: currentRoomId ? `#room-${currentRoomId}` : undefined,
                directed: false, grid: true, spacingFactor: 1.2, padding: 30,
                animate: false, fit: false,
                transform: (node, pos) => ({ x: pos.x, y: -pos.y })
            }).run();

            setTimeout(() => {
                const curr = cy.nodes('.current');
                if (curr.length > 0) {
                    cy.animate({ center: { eles: curr }, zoom: Math.min(cy.zoom(), 0.8), duration: 500, easing: 'ease-in-out-cubic' });
                } else {
                    cy.fit(undefined, 30);
                }
            }, 150);
        }

        function updateHighlight(currentRoomId) {
            if (!cy) return;
            cy.nodes().removeClass('current');
            if (currentRoomId) {
                const n = cy.getElementById(`room-${currentRoomId}`);
                if (n) n.addClass('current');
            }
        }

        function update() {
            const state = AppState.polled;
            if (!state) return;
            const mapData = state.map;

            document.getElementById('room-count').textContent = mapData?.total_rooms || '--';
            document.getElementById('connection-count').textContent = mapData?.total_connections || '--';

            if (!mapData || !mapData.raw_data) {
                if (cy) cy.elements().remove();
                return;
            }

            const mapHash = JSON.stringify({
                rooms: Object.keys(mapData.raw_data.rooms || {}),
                connections: mapData.raw_data.connections,
                currentRoom: mapData.current_room_id
            });

            if (AppState.ui.lastMapHash !== mapHash) {
                AppState.ui.lastMapHash = mapHash;
                rebuild(mapData);
            } else {
                updateHighlight(mapData.current_room_id);
            }
        }

        function resize() { if (cy) cy.resize(); }
        function fit() { if (cy) cy.fit(undefined, 30); }
        function setImageMap(map) { roomImageMap = map; }
        function getCy() { return cy; }

        return { init, update, resize, fit, setImageMap, getCy };
    })();

    /* ================================================================
       Section 22: WebSocket Handler
       ================================================================ */
    const WSHandler = (() => {
        let ws = null;
        let reconnectAttempts = 0;

        function connect() {
            try {
                ws = new WebSocket(Utils.getWebSocketUrl());
                ws.onopen = () => {
                    reconnectAttempts = 0;
                    AppState.connection.wsConnected = true;
                    _updateStreamingIndicator(true);
                };
                ws.onmessage = (event) => {
                    try { _dispatch(JSON.parse(event.data)); }
                    catch (e) { console.error('WS parse error:', e); }
                };
                ws.onclose = () => {
                    AppState.connection.wsConnected = false;
                    _updateStreamingIndicator(false);
                    _scheduleReconnect();
                };
                ws.onerror = () => {
                    AppState.connection.wsConnected = false;
                    _updateStreamingIndicator(false);
                };
            } catch (e) {
                _updateStreamingIndicator(false);
            }
        }

        function _scheduleReconnect() {
            if (reconnectAttempts < CONFIG.WS_MAX_RECONNECT) {
                reconnectAttempts++;
                setTimeout(connect, CONFIG.WS_RECONNECT_DELAY);
            }
        }

        function _updateStreamingIndicator(connected) {
            const el = document.getElementById('streaming-indicator');
            if (el) el.style.display = connected ? 'flex' : 'none';
        }

        function _dispatch(msg) {
            const handlers = {
                'generation_start': _handleGenerationStart,
                'turn_start': _handleTurnStart,
                'reasoning_chunk': _handleReasoningChunk,
                'turn_complete': _handleTurnComplete,
                'sync_state': _handleSyncState,
                'tool_status': (m) => _handleToolStatus(m.data),
                'objective_followup': _handleObjectiveFollowup,
                'objective_followup_chunk': _handleObjectiveFollowupChunk,
                'reasoner_start': _handleReasonerStart,
                'reasoner_chunk': _handleReasonerChunk,
                'reasoner_phase2_start': () => {},
                'reasoner_complete': _handleReasonerComplete,
                'memory_synthesis_start': _handleMemSynthStart,
                'memory_synthesis_chunk': _handleMemSynthChunk,
                'memory_synthesis_complete': _handleMemSynthComplete,
                'objective_review_start': _handleObjReviewStart,
                'objective_review_chunk': _handleObjReviewChunk,
                'objective_review_complete': _handleObjReviewComplete,
                'web_search_start': _handleWebSearchStart,
                'web_search_complete': _handleWebSearchComplete,
                'reasoner_tool_call': _handleReasonerToolCall
            };
            const handler = handlers[msg.type];
            if (handler) handler(msg);
        }

        function _handleGenerationStart(msg) {
            const genEl = document.getElementById('generation-num');
            if (genEl) genEl.textContent = msg.generation || 1;

            const hsEl = document.getElementById('high-score');
            if (hsEl) {
                const old = parseInt(hsEl.textContent) || 0;
                hsEl.textContent = msg.high_score || 0;
                if ((msg.high_score || 0) > old) {
                    hsEl.classList.add('new-record');
                    setTimeout(() => hsEl.classList.remove('new-record'), 3000);
                }
            }

            const deathEl = document.getElementById('death-count');
            if (deathEl && msg.total_deaths !== undefined) deathEl.textContent = msg.total_deaths;

            AppState.resetEpisode();
            AppState.connection.expectedEpisodeId = msg.episode_id || null;

            const timeline = document.getElementById('timeline');
            if (timeline) timeline.innerHTML = `<div class="card" style="text-align:center;padding:20px;opacity:0.6;"><p>Generation ${msg.generation} starting...</p></div>`;

            document.getElementById('inventory-items').innerHTML = '<div class="empty-state">Starting new game...</div>';
            document.getElementById('objectives-chips').innerHTML = '';
            const scoreEl = document.getElementById('score');
            if (scoreEl) scoreEl.textContent = '0';

            AppState.updatePolled(null);
            Poller.fetchNow();
        }

        function _handleTurnStart(msg) {
            AppState.streaming.currentTurn = msg.turn;
            AppState.streaming.reasoning = '';
        }

        function _handleReasoningChunk(msg) {
            if (msg.turn !== AppState.streaming.currentTurn) return;
            AppState.streaming.reasoning = msg.reasoning || msg.content || '';
            const streamId = `reasoning-${msg.turn}`;
            const pendingCard = document.querySelector(`.card[data-turn="${msg.turn}"][data-status="pending_ai"]`);
            if (!pendingCard) return;
            const placeholder = pendingCard.querySelector('.thinking-placeholder');
            if (!placeholder) return;

            let section = placeholder.querySelector(`[data-stream-id="${streamId}"]`);
            if (!section) {
                placeholder.innerHTML = '';
                section = StreamingLifecycle.create(placeholder, { streamId, theme: 'gold', title: 'AI Reasoning', initialText: AppState.streaming.reasoning });
                placeholder.insertAdjacentHTML('beforeend', `
                    <div class="ai-action ai-section streaming-action-display" style="margin-top:12px;opacity:0.5;">
                        <div class="ai-action-header">AI Action</div>
                        <p class="ai-action-text">Waiting for reasoning to complete...</p>
                    </div>
                `);
            }
            StreamingLifecycle.update(streamId, AppState.streaming.reasoning);

            if (msg.action) {
                const actionEl = placeholder.querySelector('.streaming-action-display');
                if (actionEl) {
                    actionEl.style.opacity = '1';
                    const at = actionEl.querySelector('.ai-action-text');
                    if (at) at.textContent = msg.action;
                }
            }
        }

        function _handleTurnComplete(msg) {
            if (msg.turn !== AppState.streaming.currentTurn) return;
            const pendingCard = document.querySelector(`.card[data-turn="${msg.turn}"][data-status="pending_ai"]`);
            if (pendingCard) {
                const placeholder = pendingCard.querySelector('.thinking-placeholder');
                const hasFollowup = pendingCard.querySelector('[data-stream-id^="followup-"]');

                if (hasFollowup) {
                    const goldSection = pendingCard.querySelector(`[data-stream-id="reasoning-${msg.turn}"]`);
                    const greenSection = pendingCard.querySelector(`[data-stream-id="followup-${msg.turn}"]`);
                    const annotation = pendingCard.querySelector('.followup-annotation');
                    const firstText = goldSection?.querySelector('.thinking-text')?.textContent || '';
                    const followupText = greenSection?.querySelector('.thinking-text')?.textContent || '';
                    const annotationText = annotation?.querySelector('.annotation-text')?.textContent || '';

                    const firstHtml = firstText ? Templates.collapsibleReasoning(firstText.trim(), 'Objective Selection', false, 'gold') : '';
                    const objAnnotation = annotationText ? `<div class="tool-annotation objective" data-tool="objective"><span class="annotation-icon">🎯</span><span class="annotation-text">${Utils.escapeHtml(annotationText)}</span></div>` : '';
                    const followupHtml = followupText ? Templates.collapsibleReasoning(followupText.trim(), 'Follow-up Reasoning', false, 'green') : '';
                    const actionHtml = msg.action ? `<div class="ai-action ai-section"><div class="ai-action-header">AI Action</div><p class="ai-action-text">${Utils.escapeHtml(msg.action)}</p></div>` : '';

                    if (placeholder) placeholder.outerHTML = firstHtml + objAnnotation + followupHtml + actionHtml;
                } else {
                    if (placeholder) {
                        const finalR = msg.reasoning || AppState.streaming.reasoning;
                        const rHtml = finalR ? Templates.collapsibleReasoning(finalR, 'AI Reasoning', false, 'gold') : '';
                        const aHtml = msg.action ? `<div class="ai-action ai-section"><div class="ai-action-header">AI Action</div><p class="ai-action-text">${Utils.escapeHtml(msg.action)}</p></div>` : '';
                        placeholder.outerHTML = rHtml + aHtml;
                    }
                }

                pendingCard.dataset.status = 'complete';
                pendingCard.classList.remove('pending-ai');
                _collapseAfterDelay(pendingCard, 1000);
            }

            AppState.streaming.currentTurn = null;
            AppState.streaming.reasoning = '';
            AppState.streaming.followup = false;
            AppState.ui.lastCompletedStreamingTurn = msg.turn;
            Poller.fetchNow();
        }

        function _handleSyncState(msg) {
            if (msg.is_streaming) {
                AppState.streaming.currentTurn = msg.turn;
                AppState.streaming.reasoning = msg.reasoning || '';
            }
        }

        function _handleToolStatus(status) {
            const statusBar = document.getElementById('toolStatusBar');
            if (!statusBar) return;
            if (status.active) {
                const isObj = status.active === 'objective' || status.active === 'objective_followup';
                if (!isObj) _showToolOverlay(status.active, status.data);
                _updateToolStatusBar(status.active, status.data, true);
            } else {
                _hideToolOverlay();
                if (status.history && status.history.length > 0) _showToolAnnotations(status.history);
                _updateToolStatusBar(null, null, false);
            }
        }

        function _showToolOverlay(toolType, data) {
            const card = document.querySelector('.card:first-child');
            if (!card) return;
            const existing = card.querySelector('.tool-overlay');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.className = `tool-overlay ${toolType}`;
            let icon, label, detail;
            if (toolType === 'pathfinder') { icon = '🧭'; label = 'Finding Path...'; detail = `Navigating to ${data?.target_name || 'destination'}`; }
            else if (toolType === 'objective_followup') { icon = '🎯'; label = 'Objective Selected'; detail = `Generating action for: ${data?.objective_text || 'objective'}`; }
            else { icon = '🎯'; label = 'Setting Objective...'; detail = `Activating: ${data?.objective_text || 'objective'}`; }
            overlay.innerHTML = `<div class="tool-icon">${icon}</div><div class="tool-label">${label}</div><div class="tool-detail">${Utils.escapeHtml(detail)}</div>`;
            card.style.position = 'relative';
            card.appendChild(overlay);
        }

        function _hideToolOverlay() {
            const overlay = document.querySelector('.tool-overlay');
            if (overlay) {
                overlay.style.animation = 'overlayFadeOut 0.5s ease forwards';
                setTimeout(() => overlay.remove(), 500);
            }
        }

        function _showToolAnnotations(history) {
            const card = document.querySelector('.card:first-child');
            if (!card) return;
            const aiAction = card.querySelector('.ai-action');
            if (!aiAction) return;
            history.forEach(result => {
                if (card.querySelector(`.tool-annotation[data-tool="${result.tool}"]`)) return;
                const ann = document.createElement('div');
                ann.className = `tool-annotation ${result.tool}`;
                ann.dataset.tool = result.tool;
                if (result.tool === 'pathfinder') {
                    ann.innerHTML = `<span class="annotation-icon">${result.success ? '✓' : '✗'}</span><span>Pathfinder:</span><span class="annotation-text">${Utils.escapeHtml(result.path || 'No path found')}</span>`;
                } else if (result.tool === 'objective') {
                    ann.innerHTML = `<span class="annotation-icon">🎯</span><span>Objective:</span><span class="annotation-text">${Utils.escapeHtml(result.objective || result.objective_id)}</span>`;
                }
                aiAction.parentNode.insertBefore(ann, aiAction.nextSibling);
            });
        }

        function _updateToolStatusBar(toolType, data, processing) {
            const bar = document.getElementById('toolStatusBar');
            if (!bar) return;
            const icon = bar.querySelector('.status-icon');
            const text = bar.querySelector('.status-text');
            if (!processing) { bar.classList.add('hidden'); bar.classList.remove('processing'); return; }
            bar.classList.remove('hidden'); bar.classList.add('processing');
            if (toolType === 'pathfinder') { icon.textContent = '🧭'; text.textContent = `Pathfinding to ${data?.target_name || 'destination'}...`; }
            else if (toolType === 'objective') { icon.textContent = '🎯'; text.textContent = 'Setting objective...'; }
            else if (toolType === 'objective_followup') { icon.textContent = '🎯'; text.textContent = 'Generating action for objective...'; }
        }

        function _handleObjectiveFollowup(msg) {
            const card = document.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (!card) return;
            const followupId = `followup-${msg.turn}`;
            const existing = card.querySelector(`[data-stream-id="${followupId}"]`);
            if (existing) {
                StreamingLifecycle.finalize(followupId, { finalContent: msg.reasoning, collapseDelay: 0 });
                let actionSection = card.querySelector('.ai-action');
                if (msg.action) {
                    if (!actionSection) {
                        existing.insertAdjacentHTML('afterend', `<div class="ai-action ai-section"><div class="ai-action-header">AI Action</div><p class="ai-action-text">${Utils.escapeHtml(msg.action)}</p></div>`);
                    } else {
                        const at = actionSection.querySelector('.ai-action-text');
                        if (at) at.textContent = msg.action;
                    }
                }
                AppState.streaming.followup = false;
                return;
            }
            // Fallback: build from scratch
            const placeholder = card.querySelector('.thinking-placeholder');
            const goldSection = card.querySelector(`[data-stream-id="reasoning-${msg.turn}"]`);
            const target = placeholder || (goldSection ? goldSection.parentElement : null);
            if (!target) return;
            const firstText = goldSection?.querySelector('.thinking-text')?.textContent || placeholder?.querySelector('.thinking-text')?.textContent || '';
            const firstHtml = firstText ? Templates.collapsibleReasoning(firstText.trim(), 'Objective Selection', false, 'gold') : '';
            const annotation = `<div class="tool-annotation objective followup-annotation" data-tool="objective"><span class="annotation-icon">🎯</span><span class="annotation-text">Selected: ${Utils.escapeHtml(msg.objective_text || msg.objective_id)}</span></div>`;
            const followupHtml = msg.reasoning ? Templates.collapsibleReasoning(msg.reasoning, 'Follow-up Reasoning', false, 'green') : '';
            const actionHtml = msg.action ? `<div class="ai-action ai-section"><div class="ai-action-header">AI Action</div><p class="ai-action-text">${Utils.escapeHtml(msg.action)}</p></div>` : '';
            if (placeholder) placeholder.outerHTML = firstHtml + annotation + followupHtml + actionHtml;
            else if (goldSection) { const ad = card.querySelector('.streaming-action-display'); if (ad) ad.remove(); goldSection.outerHTML = firstHtml + annotation + followupHtml + actionHtml; }
        }

        function _handleObjectiveFollowupChunk(msg) {
            const card = document.querySelector(`.card[data-turn="${msg.turn}"]`);
            if (!card) return;
            const followupId = `followup-${msg.turn}`;
            let section = card.querySelector(`[data-stream-id="${followupId}"]`);
            if (!section) {
                const goldId = `reasoning-${msg.turn}`;
                StreamingLifecycle.finalize(goldId, { collapseDelay: 100 });
                const ad = card.querySelector('.streaming-action-display');
                if (ad) ad.remove();
                const annHtml = `<div class="tool-annotation objective followup-annotation" data-tool="objective"><span class="annotation-icon">🎯</span><span class="annotation-text">Selected: ${Utils.escapeHtml(msg.objective_text || msg.objective_id)}</span></div>`;
                const goldSection = card.querySelector(`[data-stream-id="${goldId}"]`);
                const placeholder = card.querySelector('.thinking-placeholder');
                if (goldSection) goldSection.insertAdjacentHTML('afterend', annHtml);
                else if (placeholder) placeholder.insertAdjacentHTML('beforeend', annHtml);
                const container = placeholder || card.querySelector('.card-content');
                if (container) section = StreamingLifecycle.create(container, { streamId: followupId, theme: 'green', title: 'Follow-up Reasoning', initialText: msg.reasoning || 'Generating follow-up...' });
